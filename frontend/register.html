<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب</title>
    <link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
</head>
<body>
<div class="center-page">
    <div class="card">
        <div class="logo">حمى</div>
        <h2>إنشاء حساب</h2>

        <div class="role-box">
            <div class="role-card active" id="tenantCard">
                🧑<br>مستأجر
            </div>
            <div class="role-card" id="hostCard">
                🏠<br>صاحب عقار
            </div>
        </div>

        <div id="msg"></div>

        <input id="first_name" type="text" placeholder="الاسم الأول">
        <input id="email" type="email" placeholder="البريد الإلكتروني">
        <input id="password" type="password" placeholder="كلمة المرور">
        <input id="confirm_password" type="password" placeholder="تأكيد كلمة المرور">

        <button onclick="register()">إنشاء حساب</button>

        <div class="center-text">
            <a href="tenant-login.html">لديك حساب؟ سجّل دخولك</a>
        </div>
    </div>
</div>

<script src="js/api.js?v=20260628-absolute-nav"></script>
<script>
const registerParams = new URLSearchParams(window.location.search);
let role = registerParams.get("role") === "host" ? "host" : "tenant";

function selectRole(nextRole){
    role = nextRole;
    document.getElementById("tenantCard").classList.toggle("active", role === "tenant");
    document.getElementById("hostCard").classList.toggle("active", role === "host");
}

document.getElementById("tenantCard").onclick = () => selectRole("tenant");
document.getElementById("hostCard").onclick = () => selectRole("host");
selectRole(role);

async function register() {
    const first_name      = document.getElementById("first_name").value.trim();
    const email           = document.getElementById("email").value.trim();
    const password        = document.getElementById("password").value;
    const confirm_password = document.getElementById("confirm_password").value;

    if (!first_name || !email || !password || !confirm_password) {
        document.getElementById("msg").innerHTML =
            '<div class="error">يرجى تعبئة جميع الحقول</div>';
        return;
    }

    if (password.length < 8) {
        document.getElementById("msg").innerHTML =
            '<div class="error">كلمة المرور يجب أن تكون 8 أحرف على الأقل</div>';
        return;
    }

    if (password !== confirm_password) {
        document.getElementById("msg").innerHTML =
            '<div class="error">كلمتا المرور غير متطابقتين</div>';
        return;
    }

    try {
        const response = await fetch(BASE_URL + "/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify({
                first_name,
                email,
                password,
                password_confirmation: confirm_password,
                role
            })
        });

        const data = await response.json();

        if (response.ok) {
            document.getElementById("msg").innerHTML =
                '<div class="success">✅ تحقق من بريدك الإلكتروني لتفعيل حسابك</div>';
            setTimeout(() => window.location.href = role === "host" ? "host-login.html" : "tenant-login.html", 2000);
            return;
        }

        if (data.errors) {
            let errors = "";
            Object.values(data.errors).forEach(arr => errors += arr[0] + "<br>");
            document.getElementById("msg").innerHTML =
                '<div class="error">' + errors + '</div>';
            return;
        }

        document.getElementById("msg").innerHTML =
            '<div class="error">' + (data.message || 'حدث خطأ') + '</div>';

    } catch (error) {
        document.getElementById("msg").innerHTML =
            '<div class="error">تعذر الاتصال بالسيرفر</div>';
    }
}
</script>
</body>
</html>
