<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
</head>
<body>
<div class="center-page">
    <div class="card">
        <div class="logo">حمى</div>
        <h2>استعادة كلمة المرور</h2>

        <p style="margin-bottom:20px;">
            أدخل بريدك الإلكتروني وسنرسل لك رابط الاستعادة
        </p>

        <div id="msg"></div>

        <input id="email" placeholder="البريد الإلكتروني">

        <button onclick="sendLink()">
            إرسال رابط الاستعادة
        </button>

        <div class="center-text">
            <a href="tenant-login.html">العودة لتسجيل الدخول</a>
        </div>
    </div>
</div>
<script src="js/api.js?v=20260628-absolute-nav"></script>

<script>
async function sendLink(){

const res=await fetch(
    BASE_URL+"/forgot-password",
{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Accept":"application/json"
    },
    body:JSON.stringify({
        email:email.value
    })
});

if(res.ok){
    msg.innerHTML=
    '<div class="success">تم إرسال الرابط</div>';
}else{
    msg.innerHTML=
    '<div class="error">فشل الإرسال</div>';
}
}
</script>

</body>
</html>
