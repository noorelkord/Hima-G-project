<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حمى | مفضلتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
    <style>
        body{margin:0;background:#F8F5F0;}
        .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
        .sidebar{background:#0D2B1F;padding:1.5rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
        .sidebar-logo{font-size:1.4rem;font-weight:900;color:#D4A853;padding:0 1.2rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .sidebar-logo span{color:white;font-weight:300;font-size:0.85rem;display:block;}
        .sidebar-user{padding:0.8rem 1.2rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .user-avatar{width:44px;height:44px;border-radius:50%;background:#1B4332;border:2px solid #D4A853;display:flex;align-items:center;justify-content:center;color:#D4A853;font-size:1.1rem;font-weight:700;margin-bottom:0.5rem;}
        .user-name{color:white;font-size:0.9rem;font-weight:700;}
        .user-role{color:rgba(255,255,255,0.4);font-size:0.75rem;}
        .nav-section{font-size:0.68rem;color:rgba(255,255,255,0.3);padding:1rem 1.2rem 0.4rem;text-transform:uppercase;letter-spacing:0.8px;}
        .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.6);cursor:pointer;transition:all 0.2s;font-size:0.875rem;text-decoration:none;border-right:3px solid transparent;}
        .nav-item:hover{color:white;background:rgba(255,255,255,0.05);}
        .nav-item.active{color:#D4A853;background:rgba(212,168,83,0.1);border-right-color:#D4A853;}
        .nav-item i{width:18px;text-align:center;}
        .btn-logout{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.4);cursor:pointer;font-size:0.875rem;background:none;border:none;font-family:'Cairo',sans-serif;width:100%;text-align:right;margin-top:1rem;}
        .btn-logout:hover{color:#E74C3C;}
        .main{padding:2rem;}
        .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
        .page-title{font-size:1.5rem;font-weight:900;color:#1B4332;}
        .count-badge{background:#F0F7F4;color:#1B4332;font-size:0.85rem;font-weight:700;padding:0.3rem 0.9rem;border-radius:20px;border:1px solid #D1EDE1;}

        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem;}
        .fav-card{background:white;border-radius:16px;border:1px solid #E5E0D8;overflow:hidden;transition:all 0.3s;cursor:pointer;}
        .fav-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(27,67,50,0.15);}
        .card-img{height:185px;background:linear-gradient(135deg,#1B4332,#2D6A4F);position:relative;overflow:hidden;}
        .card-img img{width:100%;height:100%;object-fit:cover;}
        .card-img .no-img{display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem;color:rgba(255,255,255,0.1);}
        .type-badge{position:absolute;top:0.8rem;right:0.8rem;background:#D4A853;color:#1B4332;font-size:0.72rem;font-weight:700;padding:0.25rem 0.7rem;border-radius:20px;}
        .remove-btn{position:absolute;top:0.8rem;left:0.8rem;background:rgba(255,255,255,0.9);border:none;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#E74C3C;font-size:0.9rem;transition:all 0.2s;}
        .remove-btn:hover{background:white;transform:scale(1.1);}
        .card-body{padding:1rem;}
        .card-title{font-weight:700;font-size:0.95rem;color:#1A1A1A;margin-bottom:0.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .card-loc{color:#6B7280;font-size:0.8rem;margin-bottom:0.7rem;display:flex;align-items:center;gap:0.3rem;}
        .card-loc i{color:#2D6A4F;font-size:0.75rem;}
        .card-tags{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.8rem;}
        .tag{background:#F8F5F0;color:#6B7280;font-size:0.72rem;padding:0.2rem 0.5rem;border-radius:6px;display:flex;align-items:center;gap:0.2rem;}
        .tag i{color:#2D6A4F;font-size:0.68rem;}
        .card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:0.7rem;border-top:1px solid #E5E0D8;}
        .card-price{font-weight:900;font-size:1rem;color:#1B4332;}
        .card-price span{font-size:0.72rem;font-weight:400;color:#9CA3AF;}
        .btn-view{background:#1B4332;color:white;border:none;border-radius:8px;padding:0.38rem 0.9rem;font-family:'Cairo',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;text-decoration:none;}
        .btn-view:hover{background:#2D6A4F;}

        .empty-state{text-align:center;padding:5rem 2rem;color:#6B7280;grid-column:1/-1;}
        .empty-state i{font-size:4rem;color:#E5E0D8;display:block;margin-bottom:1.2rem;}
        .empty-state h3{font-weight:700;color:#1A1A1A;margin-bottom:0.5rem;}
        .empty-state a{background:#1B4332;color:white;border-radius:10px;padding:0.7rem 1.5rem;font-family:'Cairo',sans-serif;font-weight:700;text-decoration:none;display:inline-block;margin-top:1rem;}
        @media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}}
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">حمى <span>منصة الإيجار الرقمي</span></div>
        <div class="sidebar-user">
            <div class="user-avatar" id="avatar">م</div>
            <div class="user-name" id="sidebar-name">...</div>
            <div class="user-role">مستأجر</div>
        </div>
        <div class="nav-section">القائمة الرئيسية</div>
        <a class="nav-item" href="dashboard-tenant.html"><i class="fas fa-th-large"></i> لوحة التحكم</a>
        <a class="nav-item" href="tenant-properties.html"><i class="fas fa-search"></i> تصفح العقارات</a>
        <div class="nav-section">حسابي</div>
        <a class="nav-item" href="my-bookings.html"><i class="fas fa-calendar-check"></i> حجوزاتي</a>
        <a class="nav-item" href="my-contracts.html"><i class="fas fa-file-contract"></i> عقودي</a>
        <a class="nav-item active" href="my-favorites.html"><i class="fas fa-heart"></i> مفضلتي</a>
        <a class="nav-item" href="notifications.html"><i class="fas fa-bell"></i> الإشعارات</a>
        <a class="nav-item" href="profile.html"><i class="fas fa-user-cog"></i> الملف الشخصي</a>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title"><i class="fas fa-heart me-2"></i>مفضلتي</div>
            <div class="count-badge" id="count-badge">0 عقار</div>
        </div>
        <div class="grid" id="grid">
            <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جارٍ التحميل...</p></div>
        </div>
    </main>
</div>
<script src="js/api.js?v=20260628-absolute-nav"></script>
<script>
const typeMap={apartment:'شقة',villa:'فيلا',land:'أرض',chalet:'شاليه',commercial:'تجاري',parking:'موقف'};
let favorites=[];

async function init(){
    requireAuth();
    const name=localStorage.getItem('name')||'';
    document.getElementById('sidebar-name').textContent=name;
    document.getElementById('avatar').textContent=name.charAt(0)||'م';
    const r=await fetch(BASE_URL+'/tenant/favorites',{headers:authHeaders()});
    favorites=await r.json();
    render();
}

function render(){
    const grid=document.getElementById('grid');
    document.getElementById('count-badge').textContent=favorites.length+' عقار';
    if(!favorites.length){
        grid.innerHTML=`<div class="empty-state">
            <i class="fas fa-heart-broken"></i>
            <h3>لا توجد عقارات في المفضلة</h3>
            <p>تصفح العقارات وأضف ما يعجبك للمفضلة</p>
            <a href="tenant-properties.html">تصفح العقارات</a>
        </div>`;return;
    }
    grid.innerHTML=favorites.map(f=>{
        const p=f.property||f;
        const main=p.images?.find(i=>i.is_main)||p.images?.[0];
        const img=main?`<img src="${main.url}" alt="">`:`<div class="no-img"><i class="fas fa-building"></i></div>`;
        const loc=[p.governorate?.name,p.city?.name].filter(Boolean).join(' - ')||'غير محدد';
        return `
        <div class="fav-card" onclick="window.location.href='property-details.html?id=${p.id}'">
            <div class="card-img">
                ${img}
                <span class="type-badge">${typeMap[p.type]||p.type}</span>
                <button class="remove-btn" title="إزالة من المفضلة" onclick="remove(event,${p.id})">
                    <i class="fas fa-heart"></i>
                </button>
            </div>
            <div class="card-body">
                <div class="card-title">${p.title}</div>
                <div class="card-loc"><i class="fas fa-map-marker-alt"></i>${loc}</div>
                <div class="card-tags">
                    ${p.rooms?`<span class="tag"><i class="fas fa-door-open"></i>${p.rooms} غرف</span>`:''}
                    ${p.area_m2?`<span class="tag"><i class="fas fa-ruler-combined"></i>${p.area_m2}م²</span>`:''}
                    ${p.has_water?`<span class="tag"><i class="fas fa-tint"></i>ماء</span>`:''}
                    ${p.has_electricity?`<span class="tag"><i class="fas fa-bolt"></i>كهرباء</span>`:''}
                </div>
                <div class="card-footer">
                    <div class="card-price">${Number(p.price||0).toLocaleString('ar')} ₪ <span>/ شهر</span></div>
                    <a class="btn-view" href="property-details.html?id=${p.id}" onclick="event.stopPropagation()">عرض</a>
                </div>
            </div>
        </div>`;
    }).join('');
}

async function remove(e,propId){
    e.stopPropagation();
    const r=await fetch(`${BASE_URL}/tenant/favorites/${propId}`,{method:'DELETE',headers:authHeaders()});
    if(r.ok){favorites=favorites.filter(f=>(f.property?.id||f.id)!==propId);render();}
}

init();
</script>
</body>
</html>
