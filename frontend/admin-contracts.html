<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حمى | عقود المنصة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
    <style>
        body{margin:0;background:#F8F5F0;}
        .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
        .sidebar{background:#0D2B1F;padding:1.5rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
        .sidebar-logo{font-size:1.4rem;font-weight:900;color:#D4A853;padding:0 1.2rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .sidebar-logo span{color:white;font-weight:300;font-size:0.85rem;display:block;}
        .sidebar-user{padding:0.8rem 1.2rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .user-avatar{width:44px;height:44px;border-radius:50%;background:#C0392B;border:2px solid #D4A853;display:flex;align-items:center;justify-content:center;color:white;font-size:1.1rem;font-weight:700;margin-bottom:0.5rem;}
        .user-name{color:white;font-size:0.9rem;font-weight:700;}
        .user-role{color:rgba(255,255,255,0.4);font-size:0.75rem;}
        .nav-section{font-size:0.68rem;color:rgba(255,255,255,0.3);padding:1rem 1.2rem 0.4rem;text-transform:uppercase;letter-spacing:0.8px;}
        .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.6);cursor:pointer;transition:all 0.2s;font-size:0.875rem;text-decoration:none;border-right:3px solid transparent;}
        .nav-item:hover{color:white;background:rgba(255,255,255,0.05);}
        .nav-item.active{color:#D4A853;background:rgba(212,168,83,0.1);border-right-color:#D4A853;}
        .nav-item i{width:18px;text-align:center;}
        .btn-logout{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.4);cursor:pointer;font-size:0.875rem;background:none;border:none;font-family:'Cairo',sans-serif;width:100%;text-align:right;margin-top:1rem;}
        .btn-logout:hover{color:#E74C3C;}
        .main{padding:2rem;}
        .page-header,.tabs,#list{max-width:1100px;margin-left:auto;margin-right:auto;}
        .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap;}
        .page-title{font-size:1.5rem;font-weight:900;color:#1B4332;display:flex;align-items:center;gap:0.6rem;}
        .tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
        .tabs .tab{padding:0.5rem 1.2rem;border-radius:20px;font-size:0.85rem;font-weight:600;cursor:pointer;border:1.5px solid #E5E0D8;background:white;color:#6B7280;font-family:'Cairo',sans-serif;width:auto !important;flex:1 1 0;min-width:0;}
        .tab.active{background:#1B4332;color:white;border-color:#1B4332;}
        .contract-card{background:#fff;border-radius:16px;border:1px solid #E9E4DB;padding:1rem;margin-bottom:1rem;display:flex;gap:1.2rem;align-items:stretch;transition:box-shadow 0.2s,transform 0.2s,border-color 0.2s;cursor:default;}
        .contract-card:hover{box-shadow:0 4px 16px rgba(27,67,50,0.08);border-color:#D9D2C6;}
        .contract-icon{width:160px;min-width:160px;height:120px;border-radius:12px;background:linear-gradient(135deg,#1B4332,#2D6A4F);color:#D4A853;display:flex;align-items:center;justify-content:center;font-size:2.2rem;flex-shrink:0;}
        .contract-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:0.55rem;}
        .contract-title{font-weight:800;color:#16241C;font-size:1.05rem;line-height:1.35;}
        .contract-sub{font-size:0.72rem;color:#6B7280;margin-top:0.1rem;}
        .contract-meta{display:flex;flex-wrap:wrap;gap:0.45rem;}
        .meta-chip{display:inline-flex;align-items:center;gap:0.4rem;background:#F4F1EB;color:#4B5563;font-size:0.78rem;font-weight:600;padding:0.32rem 0.72rem;border-radius:999px;white-space:nowrap;}
        .meta-chip i{font-size:0.72rem;color:#2D6A4F;}
        .meta-chip.privacy{background:#FEF9EC;color:#92400E;}
        .contract-side{display:flex;flex-direction:column;align-items:flex-start;justify-content:space-between;gap:0.8rem;min-width:150px;padding-right:1.2rem;border-right:1px solid #F0ECE4;}
        .badge{font-size:0.74rem;font-weight:800;padding:0.32rem 0.85rem;border-radius:999px;white-space:nowrap;}
        .badge-active{background:#D1FAE5;color:#065F46;}
        .badge-cancelled{background:#FEE2E2;color:#991B1B;}
        .badge-expired{background:#F3F4F6;color:#374151;}
        .contract-actions{display:flex;flex-wrap:wrap;gap:0.5rem;width:100%;}
        .btn-view{background:#EAF5EF;color:#1B4332;border:1px solid #CFE7D8;border-radius:9px;padding:0.45rem 0.95rem;font-family:'Cairo',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:0.4rem;width:auto !important;white-space:nowrap;}
        .btn-view:hover{background:#DDEFE5;}
        .empty-state{text-align:center;padding:3rem;color:#6B7280;}
        .empty-state i{font-size:2.5rem;color:#E5E0D8;display:block;margin-bottom:1rem;}
        @media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}}
        @media(max-width:640px){.main{padding:1.2rem;}.tabs{flex-direction:column;}.contract-card{flex-direction:column;}.contract-icon{width:100%;min-width:0;height:170px;}.contract-side{flex-direction:row;align-items:center;width:100%;justify-content:space-between;border-right:none;border-top:1px solid #F0ECE4;padding-right:0;padding-top:0.8rem;}}
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">حمى <span>لوحة الإدارة</span></div>
        <div class="sidebar-user">
            <div class="user-avatar" id="avatar">A</div>
            <div class="user-name" id="sidebar-name">...</div>
            <div class="user-role">مشرف النظام</div>
        </div>
        <div class="nav-section">الإدارة</div>
        <a class="nav-item" href="admin-dashboard.html"><i class="fas fa-th-large"></i> لوحة التحكم</a>
        <a class="nav-item" href="admin-properties.html"><i class="fas fa-building"></i> إدارة العقارات</a>
        <a class="nav-item" href="admin-bookings.html"><i class="fas fa-calendar-check"></i> إدارة الحجوزات</a>
        <a class="nav-item active" href="admin-contracts.html"><i class="fas fa-file-contract"></i> عقود المنصة</a>
        <div class="nav-section">النظام</div>
        <a class="nav-item" href="notifications.html?v=role-sidebar"><i class="fas fa-bell"></i> الإشعارات</a>
        <a class="nav-item" href="profile.html?v=role-sidebar"><i class="fas fa-user-cog"></i> الملف الشخصي</a>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title"><i class="fas fa-file-contract"></i> عقود المنصة</div>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="filterTab('all',this)">الكل</button>
            <button class="tab" onclick="filterTab('active',this)">نشط</button>
            <button class="tab" onclick="filterTab('expired',this)">منتهي</button>
            <button class="tab" onclick="filterTab('cancelled',this)">ملغي</button>
        </div>
        <div id="list"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div></div>
    </main>
</div>
<script src="js/api.js?v=20260628-absolute-nav"></script>
<script>
const statusMap={active:'نشط',cancelled:'ملغي',expired:'منتهي'};
const statusCls={active:'badge-active',cancelled:'badge-cancelled',expired:'badge-expired'};
let allContracts=[],currentTab='all';
function fmtDate(d){ if(!d) return '—'; return String(d).split('T')[0]; }
async function init(){
    requireRole('admin','admin-login.html');
    const name=localStorage.getItem('name')||'';
    document.getElementById('sidebar-name').textContent=name;
    document.getElementById('avatar').textContent=name.charAt(0)||'A';
    try{
        const r=await fetch(BASE_URL+'/contracts',{headers:authHeaders()});
        const data=await r.json();
        if(!r.ok) throw new Error(data.message||'تعذر تحميل العقود');
        allContracts=Array.isArray(data)?data:[];
        render(allContracts);
    }catch(err){
        document.getElementById('list').innerHTML=`<div class="empty-state"><i class="fas fa-circle-exclamation"></i><p>تعذر تحميل العقود</p></div>`;
    }
}
function filterTab(status,el){
    currentTab=status;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    render(status==='all'?allContracts:allContracts.filter(c=>c.status===status));
}
function openContract(id){ goToPage('admin-contract-details.html?id='+id); }
function render(list){
    const el=document.getElementById('list');
    if(!list.length){ el.innerHTML=`<div class="empty-state"><i class="fas fa-file-circle-xmark"></i><p>لا توجد عقود في هذه الفئة</p></div>`; return; }
    el.innerHTML=list.map(c=>`
        <div class="contract-card">
            <div class="contract-icon"><i class="fas fa-file-signature"></i></div>
            <div class="contract-body">
                <div>
                    <div class="contract-title">${c.property?.title||'عقار'}</div>
                    <div class="contract-sub">عقد #${c.id}</div>
                </div>
                <div class="contract-meta">
                    <span class="meta-chip"><i class="fas fa-user"></i> المستأجر: ${c.tenant?.first_name||'—'}</span>
                    <span class="meta-chip"><i class="fas fa-user-tie"></i> صاحب العقار: ${c.host?.first_name||'—'} ${c.host?.last_name||''}</span>
                    <span class="meta-chip"><i class="fas fa-calendar-alt"></i> ${fmtDate(c.start_date)} ← ${fmtDate(c.end_date)}</span>
                    <span class="meta-chip privacy"><i class="fas fa-shield-halved"></i> ملف PDF غير متاح للأدمن</span>
                </div>
            </div>
            <div class="contract-side">
                <span class="badge ${statusCls[c.status]||''}">${statusMap[c.status]||c.status}</span>
                <div class="contract-actions">
                    <button class="btn-view" onclick="openContract(${c.id})"><i class="fas fa-eye"></i> عرض</button>
                </div>
            </div>
        </div>`).join('');
}
init();
</script>
</body>
</html>
