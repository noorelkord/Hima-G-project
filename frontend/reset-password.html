<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إعادة تعيين كلمة المرور</title>
  <link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
</head>
<body>
<div class="center-page"> 
  <div class="card">
    <h2>إعادة تعيين كلمة المرور</h2>

    <div id="msg"></div>

    <input id="password" type="password" placeholder="كلمة المرور الجديدة">
    <input id="password_confirmation" type="password" placeholder="تأكيد كلمة المرور">

    <button onclick="resetPassword()">حفظ كلمة المرور</button>

    <a href="tenant-login.html">العودة لتسجيل الدخول</a>
  </div>
</div>
<script src="js/api.js?v=20260628-absolute-nav"></script>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const email = params.get('email');

if (!token || !email) {
  window.location.href = 'forgot-password.html';
}

async function resetPassword() {
  const password = document.getElementById('password').value;
  const password_confirmation =
    document.getElementById('password_confirmation').value;

  const response = await fetch(
    BASE_URL + '/reset-password',
    {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({
        token,
        email,
        password,
        password_confirmation
      })
    }
  );

  const data = await response.json();

  if (response.ok) {
    document.getElementById('msg').innerHTML =
      '<div class="success">تم تغيير كلمة المرور</div>';

    setTimeout(() => {
      window.location.href = 'tenant-login.html';
    }, 2000);

  } else {
    document.getElementById('msg').innerHTML =
      '<div class="error">' + data.message + '</div>';
  }
}
</script>

</body>
</html>
