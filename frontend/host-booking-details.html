<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حمى | تفاصيل طلب الحجز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
    <style>
        :root{
            --green:#1B4332; --green-2:#2D6A4F; --gold:#D4A853;
            --bg:#F8F5F0; --card:#ffffff; --border:#ECE7DD; --line:#F3F0E9;
            --ink:#16241C; --muted:#6B7280; --soft:#9CA3AF;
        }
        *{box-sizing:border-box;}
        body{margin:0;background:var(--bg);font-family:'Cairo',sans-serif;}
        .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}

        /* Sidebar */
        .sidebar{background:#0D2B1F;padding:1.5rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
        .sidebar-logo{font-size:1.4rem;font-weight:900;color:var(--gold);padding:0 1.2rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .sidebar-logo span{color:white;font-weight:300;font-size:0.85rem;display:block;}
        .sidebar-user{padding:0.8rem 1.2rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .user-avatar{width:44px;height:44px;border-radius:50%;background:#1B4332;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:1.1rem;font-weight:700;margin-bottom:0.5rem;}
        .user-name{color:white;font-size:0.9rem;font-weight:700;}
        .user-role{color:rgba(255,255,255,0.4);font-size:0.75rem;}
        .nav-section{font-size:0.68rem;color:rgba(255,255,255,0.3);padding:1rem 1.2rem 0.4rem;text-transform:uppercase;letter-spacing:0.8px;}
        .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.6);cursor:pointer;transition:all 0.2s;font-size:0.875rem;text-decoration:none;border-right:3px solid transparent;}
        .nav-item:hover{color:white;background:rgba(255,255,255,0.05);}
        .nav-item.active{color:var(--gold);background:rgba(212,168,83,0.1);border-right-color:var(--gold);}
        .nav-item i{width:18px;text-align:center;}
        .btn-logout{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.4);cursor:pointer;font-size:0.875rem;background:none;border:none;font-family:'Cairo',sans-serif;width:100%;text-align:right;margin-top:1rem;}
        .btn-logout:hover{color:#E74C3C;}

        .main{padding:2.2rem 1.5rem 3rem;display:flex;justify-content:center;}
        .wrap{width:100%;max-width:880px;}

        .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;gap:1rem;flex-wrap:wrap;}
        .back-link{display:inline-flex;align-items:center;gap:0.5rem;color:var(--green-2);font-weight:700;font-size:0.875rem;text-decoration:none;}
        .back-link:hover{color:var(--green);}
        .ref{font-size:0.8rem;color:var(--soft);font-weight:700;}

        /* Hero */
        .hero{position:relative;border-radius:20px;overflow:hidden;border:1px solid var(--border);background:linear-gradient(135deg,var(--green),var(--green-2));box-shadow:0 16px 40px rgba(13,43,31,0.12);margin-bottom:0.8rem;}
        .hero-img{width:100%;height:300px;display:block;object-fit:cover;}
        .hero-noimg{height:300px;display:flex;align-items:center;justify-content:center;font-size:3.4rem;color:rgba(255,255,255,0.25);}
        .hero-overlay{position:absolute;inset:auto 0 0 0;padding:1.6rem;background:linear-gradient(to top,rgba(7,24,17,0.85),rgba(7,24,17,0));display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
        .hero-title{color:#fff;}
        .hero-title h1{margin:0;font-size:1.4rem;font-weight:900;display:flex;align-items:center;gap:0.55rem;}
        .hero-title h1 i{color:var(--gold);}
        .hero-title p{margin:0.3rem 0 0;font-size:0.88rem;color:rgba(255,255,255,0.82);display:flex;align-items:center;gap:0.45rem;}

        .badge{font-size:0.78rem;font-weight:800;padding:0.4rem 1rem;border-radius:999px;white-space:nowrap;}
        .badge-pending{background:rgba(254,243,199,0.95);color:#92400E;}
        .badge-accepted{background:rgba(209,250,229,0.95);color:#065F46;}
        .badge-rejected{background:rgba(254,226,226,0.95);color:#991B1B;}
        .badge-cancelled{background:rgba(243,244,246,0.95);color:#374151;}

        .thumbs{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.4rem;}
        .thumbs img{width:78px;height:58px;object-fit:cover;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s,transform 0.2s;}
        .thumbs img:hover{transform:translateY(-2px);}
        .thumbs img.active{border-color:var(--green-2);}

        /* KPI strip */
        .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.4rem;}
        .kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.2rem;text-align:center;}
        .kpi .ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.6rem;font-size:1.05rem;}
        .kpi .ico.green{background:#EAF5EF;color:var(--green-2);}
        .kpi .ico.gold{background:#FBF1DA;color:#B7821F;}
        .kpi .ico.blue{background:#E7F0FB;color:#2563EB;}
        .kpi .val{font-size:1.3rem;font-weight:900;color:var(--ink);line-height:1.1;}
        .kpi .lbl{font-size:0.76rem;color:var(--muted);margin-top:0.25rem;}

        /* Grid */
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;align-items:start;}
        .col{display:flex;flex-direction:column;gap:1.2rem;}
        .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem;}
        .card.full{grid-column:1/-1;}
        .card h3{font-size:0.95rem;font-weight:800;color:var(--green);margin:0 0 0.9rem;display:flex;align-items:center;gap:0.5rem;padding-bottom:0.6rem;border-bottom:2px solid var(--line);}
        .card h3 i{color:var(--green-2);}

        .info-row{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:0.65rem 0;border-bottom:1px solid var(--line);}
        .info-row:last-child{border-bottom:none;padding-bottom:0;}
        .info-label{font-size:0.82rem;color:var(--muted);display:flex;align-items:center;gap:0.5rem;}
        .info-label i{color:var(--soft);width:16px;text-align:center;}
        .info-value{font-size:0.88rem;font-weight:700;color:var(--ink);}
        .info-value.price{color:var(--green);font-size:1rem;}

        /* Tenant */
        .tenant-box{display:flex;align-items:center;gap:0.85rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--line);}
        .tenant-avatar{width:52px;height:52px;border-radius:50%;background:var(--green);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.25rem;flex-shrink:0;}
        .tenant-name{font-size:1rem;font-weight:800;color:var(--ink);}
        .tenant-sub{font-size:0.78rem;color:var(--soft);}

        /* Reviews */
        .review-item{padding:0.8rem 0;border-bottom:1px solid var(--line);}
        .review-item:last-child{border-bottom:none;padding-bottom:0;}
        .review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.3rem;}
        .reviewer-name{font-weight:700;font-size:0.85rem;color:var(--ink);}
        .stars{color:#D4A853;font-size:0.85rem;}
        .review-text{font-size:0.82rem;color:var(--muted);line-height:1.6;}
        .no-reviews{font-size:0.85rem;color:var(--soft);text-align:center;padding:1rem 0;}
        /* ✅ Tenant Rating Summary */
        .tenant-rating-summary{display:flex;align-items:center;gap:1rem;background:#F8F5F0;border-radius:10px;padding:0.8rem 1rem;margin-bottom:1rem;}
        .tenant-rating-big{font-size:1.8rem;font-weight:900;color:var(--green);line-height:1;}
        .tenant-rating-stars{display:flex;gap:0.2rem;color:#D4A853;font-size:0.9rem;margin-bottom:0.2rem;}
        .tenant-rating-count{font-size:0.78rem;color:var(--muted);}
        .tenant-no-rating{font-size:0.82rem;color:var(--soft);display:flex;align-items:center;gap:0.4rem;}

        /* Action bar */
        .action-bar{background:white;border-radius:16px;border:1px solid var(--border);padding:1.2rem 1.5rem;margin-bottom:1.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
        .action-bar-title{font-weight:700;color:var(--green);font-size:0.95rem;display:flex;align-items:center;gap:0.5rem;}
        .action-btns{display:flex;gap:0.7rem;flex-wrap:nowrap;align-items:center;}
        .btn-accept,.btn-reject{white-space:nowrap;}
        .btn-accept{background:#D1FAE5;color:#065F46;border:1px solid #BBF7D0;border-radius:10px;padding:0.6rem 1.4rem;font-family:'Cairo',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;gap:0.4rem;transition:all 0.2s;}
        .btn-accept:hover{background:#A7F3D0;}
        .btn-reject{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;border-radius:10px;padding:0.6rem 1.4rem;font-family:'Cairo',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;gap:0.4rem;transition:all 0.2s;}
        .btn-reject:hover{background:#FECACA;}

        /* Accept Modal */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:9999;}
        .modal-overlay.show{display:flex;}
        .modal{background:white;border-radius:16px;padding:1.5rem;width:90%;max-width:440px;}
        .modal h3{font-size:1rem;font-weight:700;color:var(--green);margin-bottom:0.5rem;}
        .modal p{color:var(--muted);font-size:0.875rem;margin-bottom:1rem;}
        .price-range-info{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:0.7rem 0.9rem;font-size:0.82rem;color:#065F46;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}
        .modal input{width:100%;border:1.5px solid #E5E0D8;border-radius:10px;padding:0.7rem;font-family:'Cairo',sans-serif;font-size:0.9rem;outline:none;margin-bottom:0.5rem;box-sizing:border-box;}
        .modal input:focus{border-color:var(--green-2);}
        .modal input.error{border-color:#C0392B;}
        .price-error{color:#C0392B;font-size:0.8rem;margin-bottom:0.8rem;display:none;}
        .price-error.show{display:block;}
        .modal-actions{display:flex;gap:0.7rem;}
        .btn-confirm-accept{flex:1;background:var(--green);color:white;border:none;border-radius:10px;padding:0.7rem;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;}
        .btn-cancel-modal{background:transparent;color:var(--muted);border:1.5px solid #E5E0D8;border-radius:10px;padding:0.7rem 1.2rem;font-family:'Cairo',sans-serif;cursor:pointer;}

        /* Reject Modal */
        .modal-reject h3{color:#C0392B;}
        .modal-reject textarea{width:100%;border:1.5px solid #E5E0D8;border-radius:10px;padding:0.7rem;font-family:'Cairo',sans-serif;font-size:0.875rem;resize:vertical;min-height:80px;margin-bottom:1rem;box-sizing:border-box;outline:none;}
        .modal-reject textarea:focus{border-color:#C0392B;}
        .btn-confirm-reject{flex:1;background:#C0392B;color:white;border:none;border-radius:10px;padding:0.7rem;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;}

        .toast{position:fixed;bottom:2rem;left:2rem;background:var(--green);color:white;padding:0.9rem 1.4rem;border-radius:11px;font-size:0.9rem;z-index:9999;display:none;align-items:center;gap:0.5rem;}
        .toast.show{display:flex;}
        .toast.error{background:#C0392B;}

        .state{text-align:center;padding:5rem 2rem;color:var(--muted);}
        .state i{font-size:3rem;color:var(--border);display:block;margin-bottom:1rem;}

        @media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}.kpis{grid-template-columns:1fr 1fr;}.grid{grid-template-columns:1fr;}.hero-img,.hero-noimg{height:220px;}}
    </style>
</head>
<body>
<div class="layout">

<!-- Accept Modal -->
<div class="modal-overlay" id="accept-modal">
    <div class="modal">
        <h3><i class="fas fa-check-circle me-2"></i>قبول طلب الحجز</h3>
        <p>يمكنك قبول الحجز بالسعر الأصلي أو تقديم سعر مخفض.</p>
        <div class="price-range-info">

<!-- Reject Modal -->
<div class="modal-overlay" id="reject-modal">
    <div class="modal modal-reject">
        <h3><i class="fas fa-times-circle me-2"></i>رفض طلب الحجز</h3>
        <textarea id="reject-reason" placeholder="اكتب سبب الرفض للمستأجر..."></textarea>
        <div class="modal-actions">
            <button class="btn-cancel-modal" onclick="closeModals()">إلغاء</button>
            <button class="btn-confirm-reject" onclick="confirmReject()">تأكيد الرفض</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toast-msg"></span></div>

<script src="js/api.js?v=20260628-absolute-nav"></script>
<script>
const typeMap   = {apartment:'شقة',villa:'فيلا',land:'أرض',chalet:'شاليه',commercial:'تجاري',parking:'موقف'};
const damageMap = {intact:'سليم',partial:'أضرار جزئية',renovated:'مرمم'};
const statusMap = {pending:'معلق',accepted:'مقبول',rejected:'مرفوض',cancelled:'ملغي'};
const statusCls = {pending:'badge-pending',accepted:'badge-accepted',rejected:'badge-rejected',cancelled:'badge-cancelled'};

const bookingId = new URLSearchParams(location.search).get('id');
let currentBooking = null;

function fmtDate(d){
    if(!d) return '—';
    const dt = new Date(String(d).replace(' ','T'));
    if(isNaN(dt)) return String(d).split('T')[0];
    return dt.toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});
}
function nights(a,b){
    if(!a||!b) return null;
    const d1=new Date(String(a).split('T')[0]), d2=new Date(String(b).split('T')[0]);
    const n=Math.round((d2-d1)/86400000);
    return n>0?n:null;
}

async function init(){
    requireAuth('host-login.html');
    const name = localStorage.getItem('name')||'';
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('avatar').textContent = name.charAt(0)||'H';

    if(!bookingId){
        document.getElementById('content').innerHTML =
            '<div class="state"><i class="fas fa-exclamation-triangle"></i><p>رقم الطلب غير محدد</p></div>';
        return;
    }

    const r = await fetch(`${BASE_URL}/host/bookings/${bookingId}`, {headers:authHeaders()});
    if(!r.ok){
        document.getElementById('content').innerHTML =
            '<div class="state"><i class="fas fa-circle-xmark"></i><p>تعذّر العثور على طلب الحجز</p></div>';
        return;
    }

    const data = await r.json();
    currentBooking = data.booking;
    render(data.booking, data.tenant_reviews || []);
}

function render(b, reviews){
    const p = b.property || {};
    const imgs = p.images || [];
    const mainImg = imgs.find(i=>i.is_main && i.url) || imgs.find(i=>i.url);
    const hero = mainImg
        ? `<img id="hero-img" class="hero-img" src="${mainImg.url}" alt="">`
        : `<div class="hero-noimg"><i class="fas fa-building"></i></div>`;
    const thumbsHtml = imgs.length > 1
        ? `<div class="thumbs">${imgs.filter(i=>i.url).map((im,idx)=>`<img src="${im.url}" class="${idx===0?'active':''}" onclick="swapHero('${im.url}',this)">`).join('')}</div>`
        : '';
    const loc = [p.governorate?.name, p.city?.name, p.neighborhood?.name].filter(Boolean).join(' - ') || 'غير محدد';
    const n = nights(b.start_date, b.end_date);
    const tName = `${b.tenant?.first_name||''} ${b.tenant?.last_name||''}`.trim() || 'مستأجر';
    const isPending = b.status === 'pending';

    document.getElementById('ref').textContent = 'طلب حجز رقم: #' + b.id;

    // Tenant Rating Summary
    let ratingSummaryHtml = '';
    if(reviews.length > 0){
        const avg = (reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1);
        const full  = Math.floor(avg);
        const half  = avg - full >= 0.5 ? 1 : 0;
        const empty = 5 - full - half;
        let starsHtml = '';
        for(let i=0;i<full;i++)  starsHtml += '<i class="fas fa-star"></i>';
        if(half)                  starsHtml += '<i class="fas fa-star-half-alt"></i>';
        for(let i=0;i<empty;i++) starsHtml += '<i class="far fa-star"></i>';
        ratingSummaryHtml = `
        <div class="tenant-rating-summary">
            <div class="tenant-rating-big">${avg}</div>
            <div>
                <div class="tenant-rating-stars">${starsHtml}</div>
                <div class="tenant-rating-count">بناءً على ${reviews.length} تقييم</div>
            </div>
        </div>`;
    } else {
        ratingSummaryHtml = `<div class="tenant-no-rating"><i class="fas fa-star"></i> لا توجد تقييمات سابقة لهذا المستأجر</div>`;
    }

    // Reviews HTML
    const reviewsHtml = reviews.length
        ? reviews.map(rv=>`
            <div class="review-item">
                <div class="review-header">
                    <span class="reviewer-name">${rv.reviewer?.first_name||'مستخدم'} ${rv.reviewer?.last_name||''}</span>
                    <span class="stars">${'★'.repeat(rv.rating)}${'☆'.repeat(5-rv.rating)}</span>
                </div>
                <div class="review-text">${rv.comment||'بدون تعليق'}</div>
            </div>`).join('')
        : '';

    document.getElementById('content').innerHTML = `
    ${isPending ? `
    <div class="action-bar">
        <div class="action-bar-title"><i class="fas fa-gavel"></i> اتخاذ قرار بشأن هذا الطلب</div>
        <div class="action-btns">
            <button class="btn-reject" onclick="openReject()"><i class="fas fa-times"></i> رفض</button>
            <button class="btn-accept" onclick="openAccept()"><i class="fas fa-check"></i> قبول</button>
        </div>
    </div>` : ''}

    <div class="hero">
        ${hero}
        <div class="hero-overlay">
            <div class="hero-title">
                <h1><i class="fas fa-receipt"></i> طلب حجز #${b.id}</h1>
                <p><i class="fas fa-home"></i> ${p.title||'عقار'}</p>
            </div>
            <span class="badge ${statusCls[b.status]||''}">${statusMap[b.status]||b.status}</span>
        </div>
    </div>
    ${thumbsHtml}

    <div class="kpis">
        <div class="kpi">
            <div class="ico green"><i class="fas fa-money-bill-wave"></i></div>
            <div class="val">${Number(b.property?.price||b.price||0).toLocaleString('ar')} ₪</div>
            <div class="lbl">سعر الإعلان / شهرياً</div>
        </div>
        <div class="kpi">
            <div class="ico gold"><i class="fas fa-moon"></i></div>
            <div class="val">${n ? `${n} يوم` : '—'}</div>
            <div class="lbl">مدة الإقامة</div>
        </div>
        <div class="kpi">
            <div class="ico blue"><i class="fas fa-calendar-day"></i></div>
            <div class="val" style="font-size:0.9rem;">${fmtDate(b.start_date)}</div>
            <div class="lbl">تاريخ الوصول</div>
        </div>
    </div>

    <div class="grid">
        <div class="col">
            <div class="card">
                <h3><i class="fas fa-calendar-days"></i> تفاصيل الحجز</h3>
                <div class="info-row"><span class="info-label"><i class="fas fa-calendar-plus"></i>تاريخ الوصول</span><span class="info-value">${fmtDate(b.start_date)}</span></div>
                <div class="info-row"><span class="info-label"><i class="fas fa-calendar-minus"></i>تاريخ المغادرة</span><span class="info-value">${fmtDate(b.end_date)}</span></div>
                ${n?`<div class="info-row"><span class="info-label"><i class="fas fa-moon"></i>المدة</span><span class="info-value">${n} يوم</span></div>`:''}
                <div class="info-row"><span class="info-label"><i class="fas fa-money-bill-wave"></i>سعر الحجز المتفق عليه</span><span class="info-value price">${Number(b.price||0).toLocaleString('ar')} ₪ <span style="font-size:0.78rem;color:#6B7280;font-weight:400;">/ شهرياً</span> ${Number(b.price) < Number(b.property?.price||b.price) ? '<span style="font-size:0.75rem;color:#D4A853;margin-right:0.3rem;"><i class="fas fa-tag"></i> سعر مخفض</span>' : ''}</span></div>
                <div class="info-row"><span class="info-label"><i class="fas fa-clock"></i>تاريخ الطلب</span><span class="info-value">${fmtDate(b.created_at)}</span></div>
            </div>

            <div class="card">
                <h3><i class="fas fa-home"></i> معلومات العقار</h3>
                <div class="info-row"><span class="info-label"><i class="fas fa-tag"></i>النوع</span><span class="info-value">${typeMap[p.type]||p.type||'—'}</span></div>
                <div class="info-row"><span class="info-label"><i class="fas fa-map-marker-alt"></i>الموقع</span><span class="info-value">${loc}</span></div>
                ${p.rooms?`<div class="info-row"><span class="info-label"><i class="fas fa-door-open"></i>الغرف</span><span class="info-value">${p.rooms} غرف</span></div>`:''}
                ${p.area_m2?`<div class="info-row"><span class="info-label"><i class="fas fa-ruler-combined"></i>المساحة</span><span class="info-value">${p.area_m2} م²</span></div>`:''}
                ${p.damage_status?`<div class="info-row"><span class="info-label"><i class="fas fa-hard-hat"></i>الحالة</span><span class="info-value">${damageMap[p.damage_status]||p.damage_status}</span></div>`:''}
            </div>
        </div>

        <div class="col">
            <div class="card">
                <h3><i class="fas fa-user"></i> بيانات المستأجر</h3>
                <div class="tenant-box">
                    <div class="tenant-avatar">${tName.charAt(0)}</div>
                    <div>
                        <div class="tenant-name">${tName}</div>
                        <div class="tenant-sub">رقم المستأجر: #${b.tenant?.id||'—'}</div>
                    </div>
                </div>
                <div class="info-row"><span class="info-label"><i class="fas fa-id-card"></i>رقم الهوية</span><span class="info-value">${b.tenant?.national_id||'—'}</span></div>
                <div class="info-row"><span class="info-label"><i class="fas fa-phone"></i>الهاتف</span><span class="info-value">${b.tenant?.phone||'—'}</span></div>
            </div>

            <div class="card">
                <h3><i class="fas fa-star"></i> تقييمات المستأجر السابقة</h3>
                ${ratingSummaryHtml}
                ${reviewsHtml}
            </div>
        </div>
    </div>`;
}

function swapHero(url, el){
    const hero = document.getElementById('hero-img');
    if(hero) hero.src = url;
    document.querySelectorAll('.thumbs img').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
}

function validatePrice(){
    if(!currentBooking) return true;
    const input = document.getElementById('discount-price');
    const errEl = document.getElementById('price-error');
    const val = input.value.trim();
    if(!val){ input.classList.remove('error'); errEl.classList.remove('show'); return true; }
    const price = Number(val);
    const minPrice = Math.ceil(currentBooking.price * 0.50);
    const maxPrice = currentBooking.price;
    if(isNaN(price)||price<=0){ input.classList.add('error'); errEl.textContent='يرجى إدخال سعر صحيح'; errEl.classList.add('show'); return false; }
    if(price < minPrice){ input.classList.add('error'); errEl.textContent=`السعر لا يمكن أن يقل عن ${minPrice.toLocaleString('ar')} ₪ (50% من السعر الأصلي)`; errEl.classList.add('show'); return false; }
    if(price > maxPrice){ input.classList.add('error'); errEl.textContent=`السعر لا يمكن أن يزيد عن ${maxPrice.toLocaleString('ar')} ₪`; errEl.classList.add('show'); return false; }
    input.classList.remove('error'); errEl.classList.remove('show'); return true;
}

function openAccept(){
    document.getElementById('discount-price').value='';
    document.getElementById('discount-price').classList.remove('error');
    document.getElementById('price-error').classList.remove('show');
    const minPrice = Math.ceil(currentBooking.price * 0.50);
    document.getElementById('price-range-text').textContent =
        `النطاق المسموح: من ${minPrice.toLocaleString('ar')} ₪ إلى ${Number(currentBooking.price).toLocaleString('ar')} ₪`;
    document.getElementById('accept-modal').classList.add('show');
}

function openReject(){
    document.getElementById('reject-reason').value='';
    document.getElementById('reject-modal').classList.add('show');
}

function closeModals(){
    document.getElementById('accept-modal').classList.remove('show');
    document.getElementById('reject-modal').classList.remove('show');
}

async function confirmAccept(){
    if(!validatePrice()) return;
    const disc = document.getElementById('discount-price').value.trim();
    const body = {};
    if(disc) body.discounted_price = Number(disc);
    const r = await fetch(`${BASE_URL}/host/bookings/${bookingId}/accept`,{
        method:'PATCH', headers:authHeaders(), body:JSON.stringify(body)
    });
    if(r.ok){
        closeModals();
        showToast('✅ تم قبول الحجز وإنشاء العقد تلقائياً');
        setTimeout(()=>window.location.href='host-bookings.html', 1500);
    } else {
        const data = await r.json().catch(()=>({}));
        if(r.status===422 && data.errors?.discounted_price){
            const input = document.getElementById('discount-price');
            const errEl = document.getElementById('price-error');
            input.classList.add('error');
            errEl.textContent = data.errors.discounted_price[0];
            errEl.classList.add('show');
        } else {
            showToast(data.message||'حدث خطأ، يرجى المحاولة مجدداً', true);
        }
    }
}

async function confirmReject(){
    const r = await fetch(`${BASE_URL}/host/bookings/${bookingId}/reject`,{method:'PATCH',headers:authHeaders()});
    closeModals();
    if(r.ok){
        showToast('تم رفض الحجز');
        setTimeout(()=>window.location.href='host-bookings.html', 1500);
    }
}

function showToast(msg, isError=false){
    const t=document.getElementById('toast');
    document.getElementById('toast-msg').textContent=msg;
    t.classList.toggle('error', isError);
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
}

init();
</script>
</body>
</html>
