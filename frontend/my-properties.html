<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حمى | عقاراتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
    <style>
        body { margin:0; background:#F8F5F0; }
        .container { max-width:1100px; margin:0 auto; padding:2rem 1.5rem; }
        .page-header {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:1.5rem;
        }
        .page-title { font-size:1.5rem; font-weight:900; color:#1B4332; }
        .btn-add {
            background:#D4A853; color:#1B4332; border:none;
            border-radius:10px; padding:0.65rem 1.3rem;
            font-family:'Cairo',sans-serif; font-weight:700;
            font-size:0.9rem; cursor:pointer; transition:background 0.2s;
            display:flex; align-items:center; gap:0.4rem;
        }
        .btn-add:hover { background:#F0C97A; }

        /* Tabs */
        .tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; }
        .tab {
            padding:0.5rem 1.2rem; border-radius:20px; font-size:0.85rem;
            font-weight:600; cursor:pointer; border:1.5px solid #E5E0D8;
            background:white; color:#6B7280; transition:all 0.2s;
            font-family:'Cairo',sans-serif;
        }
        .tab.active { background:#1B4332; color:white; border-color:#1B4332; }

        /* Property rows */
        .prop-row {
            background:white; border-radius:14px; border:1px solid #E5E0D8;
            display:flex; gap:1rem; padding:1rem; margin-bottom:0.8rem;
            align-items:center; transition:box-shadow 0.2s, transform 0.2s;
            cursor:default;
        }
        .prop-row:hover { box-shadow:0 4px 16px rgba(27,67,50,0.1); transform:translateY(-2px); }
        .prop-thumb {
            width:90px; height:70px; border-radius:10px;
            background:linear-gradient(135deg,#1B4332,#2D6A4F);
            overflow:hidden; flex-shrink:0;
        }
        .prop-thumb img { width:100%; height:100%; object-fit:cover; }
        .prop-thumb .no-img {
            display:flex; align-items:center; justify-content:center;
            height:100%; font-size:1.5rem; color:rgba(255,255,255,0.2);
        }
        .prop-info { flex:1; min-width:0; }
        .prop-name { font-weight:700; font-size:0.95rem; color:#1A1A1A; margin-bottom:0.2rem; }
        .prop-loc  { font-size:0.78rem; color:#6B7280; margin-bottom:0.4rem; }
        .prop-meta { display:flex; gap:0.5rem; flex-wrap:wrap; }

        /* Badges */
        .badge {
            font-size:0.72rem; font-weight:700; padding:0.2rem 0.6rem;
            border-radius:12px; display:inline-flex; align-items:center; gap:0.2rem;
        }
        .badge-pending    { background:#FEF3C7; color:#92400E; }
        .badge-accepted   { background:#D1FAE5; color:#065F46; }
        .badge-rejected   { background:#FEE2E2; color:#991B1B; }
        .badge-available  { background:#D1FAE5; color:#065F46; }
        .badge-booked     { background:#DBEAFE; color:#1E40AF; }
        .badge-not_available { background:#F3F4F6; color:#374151; }

        .rejection-note {
            background:#FEF2F2; border:1px solid #FECACA;
            border-radius:8px; padding:0.5rem 0.8rem;
            font-size:0.78rem; color:#C0392B; margin-top:0.5rem;
        }

        /* Toggle availability */
        .switch { position:relative; width:40px; height:22px; flex-shrink:0; }
        .switch input { opacity:0; width:0; height:0; }
        .slider {
            position:absolute; inset:0; background:#D1D5DB;
            border-radius:22px; cursor:pointer; transition:0.3s;
        }
        .slider:before {
            content:''; position:absolute;
            width:16px; height:16px; left:3px; bottom:3px;
            background:white; border-radius:50%; transition:0.3s;
        }
        input:checked + .slider { background:#1B4332; }
        input:checked + .slider:before { transform:translateX(18px); }

        /* Actions */
        .prop-actions { display:flex; gap:0.5rem; align-items:center; flex-shrink:0; flex-wrap:nowrap; }
        .btn-action {
            border-radius:8px; border:none; padding:0.38rem 0.9rem;
            display:inline-flex; align-items:center; gap:0.4rem;
            cursor:pointer; font-size:0.8rem; font-weight:600;
            font-family:'Cairo',sans-serif; transition:all 0.2s;
            white-space:nowrap;
        }
        .btn-view   { background:#EFF6FF; color:#1D4ED8; border:1px solid #BFDBFE; }
        .btn-view:hover   { background:#DBEAFE; }
        .btn-edit   { background:#FEF3C7; color:#92400E; border:1px solid #FDE68A; }
        .btn-edit:hover   { background:#FDE68A; }
        .btn-delete { background:#FEE2E2; color:#991B1B; border:1px solid #FECACA; }
        .btn-delete:hover { background:#FECACA; }
        .btn-action:disabled, .btn-action[style*="not-allowed"] { opacity:0.4; cursor:not-allowed; pointer-events:auto; }
        /* Tooltip للأزرار المعطلة */
        .btn-action[disabled], .btn-action.disabled {
            opacity:0.4; cursor:not-allowed; pointer-events:auto;
        }
        .btn-action[data-tooltip] { position:relative; }
        .btn-action[data-tooltip]:hover::after {
            content:attr(data-tooltip);
            position:absolute; bottom:calc(100% + 6px); right:50%;
            transform:translateX(50%);
            background:rgba(0,0,0,0.75); color:white;
            font-size:0.72rem; padding:0.3rem 0.6rem;
            border-radius:6px; white-space:nowrap;
            pointer-events:none; z-index:999;
        }

        .empty-state { text-align:center; padding:4rem; color:#6B7280; }
        .empty-state i { font-size:3.5rem; color:#E5E0D8; display:block; margin-bottom:1rem; }
        .empty-state h3 { font-size:1rem; font-weight:700; color:#1A1A1A; margin-bottom:0.5rem; }

        /* Modal */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.5);
            display:none; align-items:center; justify-content:center; z-index:9999;
        }
        .modal-overlay.show { display:flex; }
        .modal {
            background:white; border-radius:16px; padding:1.5rem;
            width:90%; max-width:400px;
        }
        .modal h3 { font-size:1rem; font-weight:700; color:#1B4332; margin-bottom:0.5rem; }
        .modal p  { color:#6B7280; font-size:0.875rem; margin-bottom:1rem; }
        .modal-actions { display:flex; gap:0.7rem; }
        .btn-confirm-delete {
            flex:1; background:#C0392B; color:white; border:none;
            border-radius:10px; padding:0.7rem; font-family:'Cairo',sans-serif;
            font-weight:700; cursor:pointer;
        }
        .btn-cancel-modal {
            flex:1; background:transparent; color:#6B7280;
            border:1.5px solid #E5E0D8; border-radius:10px; padding:0.7rem;
            font-family:'Cairo',sans-serif; cursor:pointer;
        }
    </style>
</head>
<body>
<div id="navbar"></div>
<div class="container">
    <div class="page-header">
        <div class="page-title"><i class="fas fa-building"></i> عقاراتي</div>
        <button class="btn-add" onclick="window.location.href='property-form.html'">
            <i class="fas fa-plus"></i> إضافة عقار
        </button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="filterTab('all',this)">الكل</button>
        <button class="tab" onclick="filterTab('pending',this)">بانتظار الموافقة</button>
        <button class="tab" onclick="filterTab('accepted',this)">مقبولة</button>
        <button class="tab" onclick="filterTab('rejected',this)">مرفوضة</button>
    </div>

    <div id="list">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جارٍ التحميل...</p></div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="del-modal">
    <div class="modal">
        <h3>تأكيد الحذف</h3>
        <p>هل أنت متأكد من أرشفة هذا العقار؟ لن يظهر للعموم بعد ذلك.</p>
        <div class="modal-actions">
            <button class="btn-cancel-modal" onclick="closeModal()">إلغاء</button>
            <button class="btn-confirm-delete" onclick="confirmDelete()">نعم، أرشفة</button>
        </div>
    </div>
</div>

<script src="js/api.js?v=20260628-absolute-nav"></script>
<script src="js/navbar.js?v=20260628-live-fixes"></script>
<script>
const statusMap = {pending:'قيد المراجعة',accepted:'مقبول',rejected:'مرفوض'};
const availMap  = {available:'متاح',not_available:'غير متاح',booked:'محجوز'};
const statusBadge = {pending:'badge-pending',accepted:'badge-accepted',rejected:'badge-rejected'};
const availBadge  = {available:'badge-available',not_available:'badge-not_available',booked:'badge-booked'};

let allProps = [];
let deleteId = null;
let currentTab = 'all';

async function loadProperties(){
    const r = await fetch(BASE_URL+'/host/properties',{headers:authHeaders()});
    allProps = await r.json();
    render(allProps);
}

function filterTab(status, el){
    currentTab = status;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    const filtered = status==='all' ? allProps : allProps.filter(p=>p.status===status);
    render(filtered);
}

function render(list){
    const el = document.getElementById('list');
    if(!list.length){
        el.innerHTML=`<div class="empty-state">
            <i class="fas fa-home"></i>
            <h3>لا توجد عقارات</h3>
            <p>اضغط على "إضافة عقار" لإضافة عقارك الأول</p>
        </div>`; return;
    }
    el.innerHTML = list.map(p=>{
        const main = p.images?.find(i=>i.is_main)||p.images?.[0];
        const img  = main ? `<img src="${main.url}" alt="">` : `<div class="no-img"><i class="fas fa-building"></i></div>`;
        const loc  = [p.governorate?.name, p.city?.name].filter(Boolean).join(' - ')||'غير محدد';
        const canToggle = p.status==='accepted' && p.availability!=='booked';
        const isAvail   = p.availability==='available';
        const isBooked  = p.availability === 'booked';
        return `
        <div class="prop-row">
            <div class="prop-thumb">${img}</div>
            <div class="prop-info">
                <div class="prop-name">${p.title}</div>
                <div class="prop-loc"><i class="fas fa-map-marker-alt"></i> ${loc}</div>
                <div class="prop-meta">
                    <span class="badge ${statusBadge[p.status]}">${statusMap[p.status]}</span>
                    <span class="badge ${availBadge[p.availability]}">${availMap[p.availability]}</span>
                    <span style="font-size:0.8rem;color:#6B7280;">${Number(p.price).toLocaleString('ar')} ₪/شهر</span>
                </div>
                ${p.status==='rejected'&&p.rejection_reason?`<div class="rejection-note"><i class="fas fa-exclamation-circle me-1"></i>${p.rejection_reason}</div>`:''}
            </div>
            ${canToggle?`
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;" onclick="event.stopPropagation()">
                <label class="switch">
                    <input type="checkbox" ${isAvail?'checked':''} onchange="toggleAvail(${p.id},this)">
                    <span class="slider"></span>
                </label>
                <span style="font-size:0.65rem;color:#6B7280;">${isAvail?'متاح':'مخفي'}</span>
            </div>`:''}
            <div class="prop-actions">
                <button class="btn-action btn-view"
                    onclick="event.stopPropagation(); window.location.href='property-details.html?id=${p.id}'">
                    <i class="fas fa-eye"></i> عرض
                </button>
                ${isBooked
                    ? `<button class="btn-action btn-edit disabled" data-tooltip="لا يمكن تعديل عقار محجوز" onclick="event.stopPropagation()"><i class="fas fa-pen"></i> تعديل</button>`
                    : `<button class="btn-action btn-edit" onclick="event.stopPropagation(); window.location.href='property-form.html?id=${p.id}'"><i class="fas fa-pen"></i> تعديل</button>`
                }
                ${isBooked
                    ? `<button class="btn-action btn-delete disabled" data-tooltip="لا يمكن حذف عقار محجوز" onclick="event.stopPropagation()"><i class="fas fa-trash"></i> حذف</button>`
                    : `<button class="btn-action btn-delete" onclick="event.stopPropagation(); openModal(${p.id})"><i class="fas fa-trash"></i> حذف</button>`
                }
            </div>
        </div>`;
    }).join('');
}

async function toggleAvail(id, el){
    const r = await fetch(`${BASE_URL}/host/properties/${id}/availability`,{
        method:'PATCH', headers:authHeaders()
    });
    if(!r.ok){
        el.checked = !el.checked;
        const data = await r.json().catch(()=>({}));
        alert(data.message || 'لا يمكن تغيير الإتاحة');
    } else {
        const p = allProps.find(x=>x.id===id);
        if(p) p.availability = el.checked?'available':'not_available';
    }
}

function openModal(id){ deleteId=id; document.getElementById('del-modal').classList.add('show'); }
function closeModal(){ deleteId=null; document.getElementById('del-modal').classList.remove('show'); }

async function confirmDelete(){
    if(!deleteId) return;
    const idToDelete = deleteId;
    const r = await fetch(`${BASE_URL}/host/properties/${deleteId}`,{
        method:'DELETE', headers:authHeaders()
    });
    closeModal();
    if(r.ok){
        allProps = allProps.filter(p=>p.id!==idToDelete);
        filterTab(currentTab,document.querySelector('.tab.active'));
        return;
    }

    const data = await r.json().catch(()=>({}));
    alert(data.message || 'لا يمكن أرشفة هذا العقار الآن');
}

requireAuth('host-login.html');
loadProperties();
</script>
</body>
</html>
