<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حمى | عقودي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
    <style>
        body{margin:0;background:#F8F5F0;}
        .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
        .sidebar{background:#0D2B1F;padding:1.5rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
        .sidebar-logo{font-size:1.4rem;font-weight:900;color:#D4A853;padding:0 1.2rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .sidebar-logo span{color:white;font-weight:300;font-size:0.85rem;display:block;}
        .sidebar-user{padding:0.8rem 1.2rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .user-avatar{width:44px;height:44px;border-radius:50%;background:#1B4332;border:2px solid #D4A853;display:flex;align-items:center;justify-content:center;color:#D4A853;font-size:1.1rem;font-weight:700;margin-bottom:0.5rem;}
        .user-name{color:white;font-size:0.9rem;font-weight:700;}
        .user-role{color:rgba(255,255,255,0.4);font-size:0.75rem;}
        .nav-section{font-size:0.68rem;color:rgba(255,255,255,0.3);padding:1rem 1.2rem 0.4rem;text-transform:uppercase;letter-spacing:0.8px;}
        .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.6);cursor:pointer;transition:all 0.2s;font-size:0.875rem;text-decoration:none;border-right:3px solid transparent;}
        .nav-item:hover{color:white;background:rgba(255,255,255,0.05);}
        .nav-item.active{color:#D4A853;background:rgba(212,168,83,0.1);border-right-color:#D4A853;}
        .nav-item i{width:18px;text-align:center;}
        .btn-logout{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.4);cursor:pointer;font-size:0.875rem;background:none;border:none;font-family:'Cairo',sans-serif;width:100%;text-align:right;margin-top:1rem;}
        .btn-logout:hover{color:#E74C3C;}
        .main{padding:2rem;}
        .page-title{font-size:1.5rem;font-weight:900;color:#1B4332;margin-bottom:1.5rem;}
        .tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;}
        .tab{padding:0.5rem 1.2rem;border-radius:20px;font-size:0.85rem;font-weight:600;cursor:pointer;border:1.5px solid #E5E0D8;background:white;color:#6B7280;font-family:'Cairo',sans-serif;}
        .tab.active{background:#1B4332;color:white;border-color:#1B4332;}

        .contract-card{background:white;border-radius:14px;border:1px solid #E5E0D8;padding:1.3rem;margin-bottom:0.9rem;transition:box-shadow 0.2s;}
        .contract-card:hover{box-shadow:0 4px 16px rgba(27,67,50,0.1);}
        .contract-top{display:flex;gap:1rem;align-items:flex-start;margin-bottom:1rem;}
        .contract-icon{width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,#1B4332,#2D6A4F);display:flex;align-items:center;justify-content:center;color:#D4A853;font-size:1.3rem;flex-shrink:0;}
        .contract-info{flex:1;}
        .contract-title{font-weight:700;font-size:0.95rem;color:#1A1A1A;margin-bottom:0.2rem;}
        .contract-host{font-size:0.8rem;color:#6B7280;margin-bottom:0.3rem;}
        .contract-dates{font-size:0.8rem;color:#6B7280;display:flex;align-items:center;gap:0.4rem;}
        .contract-footer{display:flex;justify-content:space-between;align-items:center;padding-top:0.9rem;border-top:1px solid #F3F4F6;}
        .contract-price{font-weight:700;color:#1B4332;font-size:0.95rem;}
        .contract-actions{display:flex;gap:0.6rem;}

        .badge{font-size:0.72rem;font-weight:700;padding:0.25rem 0.7rem;border-radius:12px;}
        .badge-active{background:#D1FAE5;color:#065F46;}
        .badge-expired{background:#F3F4F6;color:#374151;}
        .badge-cancelled{background:#FEE2E2;color:#991B1B;}

        .btn-pdf{background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;border-radius:8px;padding:0.42rem 0.9rem;font-family:'Cairo',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:0.3rem;}
        .btn-pdf:hover{background:#DBEAFE;}
        .btn-cancel-contract{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;border-radius:8px;padding:0.42rem 0.9rem;font-family:'Cairo',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;}
        .btn-cancel-contract:hover{background:#FECACA;}
        .btn-review{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;border-radius:8px;padding:0.42rem 0.9rem;font-family:'Cairo',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:0.3rem;}

        .empty-state{text-align:center;padding:3rem;color:#6B7280;}
        .empty-state i{font-size:3rem;color:#E5E0D8;display:block;margin-bottom:1rem;}

        /* Cancel modal */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:9999;}
        .modal-overlay.show{display:flex;}
        .modal{background:white;border-radius:16px;padding:1.5rem;width:90%;max-width:420px;}
        .modal h3{font-size:1rem;font-weight:700;color:#C0392B;margin-bottom:0.6rem;}
        .modal p{color:#6B7280;font-size:0.875rem;margin-bottom:1.2rem;}
        .modal-actions{display:flex;gap:0.7rem;}
        .btn-confirm{flex:1;background:#C0392B;color:white;border:none;border-radius:10px;padding:0.7rem;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;}
        .btn-cancel-modal{background:transparent;color:#6B7280;border:1.5px solid #E5E0D8;border-radius:10px;padding:0.7rem 1.2rem;font-family:'Cairo',sans-serif;cursor:pointer;}
        @media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}}
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">حمى <span>منصة الإيجار الرقمي</span></div>
        <div class="sidebar-user">
            <div class="user-avatar" id="avatar">م</div>
            <div class="user-name" id="sidebar-name">...</div>
            <div class="user-role">مستأجر</div>
        </div>
        <div class="nav-section">القائمة الرئيسية</div>
        <a class="nav-item" href="dashboard-tenant.html"><i class="fas fa-th-large"></i> لوحة التحكم</a>
        <a class="nav-item" href="tenant-properties.html"><i class="fas fa-search"></i> تصفح العقارات</a>
        <div class="nav-section">حسابي</div>
        <a class="nav-item" href="my-bookings.html"><i class="fas fa-calendar-check"></i> حجوزاتي</a>
        <a class="nav-item active" href="my-contracts.html"><i class="fas fa-file-contract"></i> عقودي</a>
        <a class="nav-item" href="my-favorites.html"><i class="fas fa-heart"></i> مفضلتي</a>
        <a class="nav-item" href="notifications.html"><i class="fas fa-bell"></i> الإشعارات</a>
        <a class="nav-item" href="profile.html"><i class="fas fa-user-cog"></i> الملف الشخصي</a>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </aside>

    <main class="main">
        <div class="page-title"><i class="fas fa-file-contract me-2"></i>عقودي</div>

        <div class="tabs">
            <button class="tab active" onclick="filterTab('all',this)">الكل</button>
            <button class="tab" onclick="filterTab('active',this)">نشط</button>
            <button class="tab" onclick="filterTab('expired',this)">منتهي</button>
            <button class="tab" onclick="filterTab('cancelled',this)">ملغي</button>
        </div>

        <div id="list"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جارٍ التحميل...</p></div></div>
    </main>
</div>

<!-- Cancel Modal -->
<div class="modal-overlay" id="cancel-modal">
    <div class="modal">
        <h3><i class="fas fa-times-circle me-2"></i>إلغاء العقد</h3>
        <p>هل أنت متأكد من إلغاء هذا العقد؟ سيتم إشعار الهوست وإعادة العقار للمتاح.</p>
        <div class="modal-actions">
            <button class="btn-cancel-modal" onclick="closeModal()">تراجع</button>
            <button class="btn-confirm" onclick="confirmCancel()">نعم، إلغاء العقد</button>
        </div>
    </div>
</div>

<script src="js/api.js?v=20260628-absolute-nav"></script>
<script>
const statusMap={active:'نشط',expired:'منتهي',cancelled:'ملغي'};
const statusCls={active:'badge-active',expired:'badge-expired',cancelled:'badge-cancelled'};
let allContracts=[],cancelId=null,currentTab='all';

async function init(){
    requireAuth();
    const name=localStorage.getItem('name')||'';
    document.getElementById('sidebar-name').textContent=name;
    document.getElementById('avatar').textContent=name.charAt(0)||'م';
    const r=await fetch(BASE_URL+'/contracts',{headers:authHeaders()});
    allContracts=await r.json();
    render(allContracts);
}

function filterTab(status,el){
    currentTab=status;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    render(status==='all'?allContracts:allContracts.filter(c=>c.status===status));
}

function render(list){
    const el=document.getElementById('list');
    if(!list.length){el.innerHTML=`<div class="empty-state"><i class="fas fa-file-alt"></i><p>لا توجد عقود في هذه الفئة</p></div>`;return;}
    el.innerHTML=list.map(c=>{
        const isActive=c.status==='active';
        const canReview=c.status==='expired'||c.status==='cancelled';
        return `
        <div class="contract-card">
            <div class="contract-top">
                <div class="contract-icon"><i class="fas fa-file-contract"></i></div>
                <div class="contract-info">
                    <div class="contract-title">${c.property?.title||'عقار'}</div>
                    <div class="contract-host"><i class="fas fa-user-tie me-1"></i>الهوست: ${c.host?.first_name||'—'} ${c.host?.last_name||''}</div>
                    <div class="contract-dates"><i class="fas fa-calendar-alt"></i>${c.start_date?.split('T')[0]} → ${c.end_date?.split('T')[0]}</div>
                </div>
                <span class="badge ${statusCls[c.status]||''}">${statusMap[c.status]||c.status}</span>
            </div>
            <div class="contract-footer">
                <div class="contract-price">${Number(c.price||0).toLocaleString('ar')} ₪ <span style="font-size:0.75rem;font-weight:400;color:#9CA3AF;">/ شهر</span></div>
                <div class="contract-actions">
                    ${c.pdf_path?`<a class="btn-pdf" href="${BASE_URL}/contracts/${c.id}/download" target="_blank"><i class="fas fa-file-pdf"></i> تحميل PDF</a>`:''}
                    ${isActive?`<button class="btn-cancel-contract" onclick="openCancel(${c.id})"><i class="fas fa-times me-1"></i>إلغاء العقد</button>`:''}
                    ${canReview?`<button class="btn-review" onclick="window.location.href='review-form.html?contract_id=${c.id}'"><i class="fas fa-star me-1"></i>تقييم</button>`:''}
                </div>
            </div>
        </div>`;
    }).join('');
}

function openCancel(id){cancelId=id;document.getElementById('cancel-modal').classList.add('show');}
function closeModal(){cancelId=null;document.getElementById('cancel-modal').classList.remove('show');}

async function confirmCancel(){
    const r=await fetch(`${BASE_URL}/contracts/${cancelId}/cancel`,{method:'PATCH',headers:authHeaders()});
    closeModal();
    if(r.ok){allContracts=allContracts.map(c=>c.id===cancelId?{...c,status:'cancelled'}:c);filterTab(currentTab,document.querySelector('.tab.active'));}
}

init();
</script>
</body>
</html>
