<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حمى | تفاصيل العقار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
    <style>
        body { margin: 0; background: #F8F5F0; }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* Gallery */
        .gallery { border-radius: 16px; overflow: hidden; margin-bottom: 1.5rem; }
        .gallery-main {
            height: 380px;
            background:#F8F5F0;
            position: relative;
            overflow: hidden;
        }
        .gallery-main img { width:100%; height:100%; object-fit:cover; object-position:center; }
        .gallery-main .no-img {
            display:flex; align-items:center; justify-content:center;
            height:100%; font-size:5rem; color:rgba(255,255,255,0.1);
        }
        .gallery-thumbs {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem 0 0;
        }
        .gallery-thumbs.single { display:none; }
        .thumb {
            width: 80px; height: 60px; border-radius: 8px;
            overflow: hidden; cursor: pointer; border: 2px solid transparent;
            transition: border-color 0.2s; flex-shrink: 0;
        }
        .thumb.active { border-color: #D4A853; }
        .thumb img { width:100%; height:100%; object-fit:cover; }

        /* Layout */
        .detail-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 1.5rem;
        }

        /* Left */
        .detail-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #E5E0D8;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .prop-title-main { font-size: 1.4rem; font-weight: 900; color: #1B4332; margin-bottom: 0.5rem; }
        .prop-location-main {
            color: #6B7280; font-size: 0.9rem;
            display: flex; align-items: center; gap: 0.4rem; margin-bottom: 1rem;
        }
        .prop-location-main i { color: #2D6A4F; }

        .type-badge {
            display: inline-block;
            background: #D4A853; color: #1B4332;
            font-size: 0.8rem; font-weight: 700;
            padding: 0.3rem 0.9rem; border-radius: 20px;
            margin-bottom: 1rem;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .spec-item {
            background: #F8F5F0;
            border-radius: 10px;
            padding: 0.8rem;
            text-align: center;
        }
        .spec-item i { font-size: 1.2rem; color: #2D6A4F; margin-bottom: 0.3rem; display: block; }
        .spec-item .val { font-weight: 700; font-size: 0.95rem; color: #1A1A1A; }
        .spec-item .lbl { font-size: 0.72rem; color: #6B7280; }

        .services-row {
            display: flex; gap: 0.8rem; flex-wrap: wrap; margin: 1rem 0;
        }
        .service-badge {
            display: flex; align-items: center; gap: 0.4rem;
            background: #F0FDF4; color: #065F46;
            border: 1px solid #BBF7D0;
            font-size: 0.82rem; font-weight: 600;
            padding: 0.35rem 0.8rem; border-radius: 20px;
        }
        .service-badge.off { background: #F9FAFB; color: #6B7280; border-color: #E5E0D8; }

        .section-title {
            font-weight: 700; font-size: 1rem;
            color: #1B4332; margin-bottom: 0.8rem;
            padding-bottom: 0.5rem; border-bottom: 2px solid #E5E0D8;
        }
        .description { color: #6B7280; font-size: 0.9rem; line-height: 1.8; }

        /* Reviews */
        .review-item {
            padding: 1rem 0; border-bottom: 1px solid #E5E0D8;
        }
        .review-item:last-child { border-bottom: none; }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 0.4rem; }
        .reviewer-name { font-weight: 700; font-size: 0.9rem; color: #1A1A1A; }
        .stars { color: #D4A853; font-size: 0.85rem; }
        .review-text { color: #6B7280; font-size: 0.85rem; }

        /* Right sidebar */
        .price-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #E5E0D8;
            padding: 1.5rem;
            position: sticky;
            top: 1rem;
        }
        .price-amount { font-size: 2rem; font-weight: 900; color: #1B4332; }
        .price-period { font-size: 0.85rem; color: #6B7280; margin-bottom: 1.2rem; }

        .btn-book {
            width: 100%; background: #1B4332; color: white;
            border: none; border-radius: 12px; padding: 0.9rem;
            font-family: 'Cairo',sans-serif; font-weight: 700; font-size: 1rem;
            cursor: pointer; margin-bottom: 0.7rem; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-book:hover { background: #2D6A4F; }
        .btn-book:disabled { opacity:0.5; cursor:not-allowed; }

        .btn-whatsapp {
            width: 100%; background: #25D366; color: white;
            border: none; border-radius: 12px; padding: 0.9rem;
            font-family: 'Cairo',sans-serif; font-weight: 700; font-size: 1rem;
            cursor: pointer; margin-bottom: 1rem; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            text-decoration: none;
        }
        .btn-whatsapp:hover { background: #1ebe5a; color: white; }

        .host-mini {
            background: #F8F5F0; border-radius: 10px; padding: 0.9rem;
            display: flex; align-items: center; gap: 0.8rem;
        }
        .host-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: #1B4332; display: flex; align-items: center; justify-content: center;
            color: #D4A853; font-size: 1rem; font-weight: 700; flex-shrink: 0;
        }
        .host-name { font-weight: 700; font-size: 0.9rem; color: #1A1A1A; }
        .host-label { font-size: 0.75rem; color: #6B7280; }

        .divider { border: none; border-top: 1px solid #E5E0D8; margin: 1rem 0; }

        .skeleton {
            background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite; border-radius: 8px;
        }
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

        @media(max-width:768px){
            .detail-layout{grid-template-columns:1fr;}
            .specs-grid{grid-template-columns:repeat(2,1fr);}
        }
    </style>
</head>
<body>
<div id="navbar"></div>

<div class="container">
    <!-- Breadcrumb -->
    <div style="font-size:0.85rem;color:#6B7280;margin-bottom:1rem;">
        <a href="index.html" style="color:#2D6A4F;text-decoration:none;">الرئيسية</a>
        <span style="margin:0 0.4rem">/</span>
        <a id="breadcrumb-properties" href="properties.html" style="color:#2D6A4F;text-decoration:none;">العقارات</a>
        <span style="margin:0 0.4rem">/</span>
        <span id="breadcrumb-title">تفاصيل العقار</span>
    </div>

    <!-- Gallery -->
    <div class="gallery">
        <div class="gallery-main" id="main-img">
            <div class="no-img"><i class="fas fa-building"></i></div>
        </div>
        <div class="gallery-thumbs" id="thumbs"></div>
    </div>

    <div class="detail-layout">
        <!-- LEFT -->
        <div>
            <!-- Main info -->
            <div class="detail-card">
                <div class="prop-title-main" id="title">...</div>
                <div class="prop-location-main">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="location">...</span>
                </div>
                <span class="type-badge" id="type-badge">...</span>

                <div class="specs-grid" id="specs"></div>

                <div class="services-row" id="services"></div>
            </div>

            <!-- Description -->
            <div class="detail-card">
                <div class="section-title"><i class="fas fa-align-right me-2"></i>وصف العقار</div>
                <div class="description" id="description">...</div>
            </div>

            <!-- Reviews -->
            <div class="detail-card">
                <div class="section-title"><i class="fas fa-star me-2"></i>التقييمات</div>
                <div id="reviews-list">
                    <p style="color:#6B7280;font-size:0.85rem;">لا توجد تقييمات بعد</p>
                </div>
            </div>
        </div>

        <!-- RIGHT -->
        <div>
            <div class="price-card">
                <div class="price-amount" id="price">...</div>
                <div class="price-period">₪ / شهرياً</div>

                <button class="btn-book" id="btn-book" onclick="handleBook()">
                    <i class="fas fa-calendar-check"></i> احجز الآن
                </button>

                <a class="btn-whatsapp" id="btn-whatsapp" href="#" target="_blank">
                    <i class="fab fa-whatsapp"></i> تواصل عبر واتساب
                </a>

                <hr class="divider">

                <div class="host-mini" id="host-info">
                    <div class="host-avatar"><i class="fas fa-user"></i></div>
                    <div>
                        <div class="host-name">...</div>
                        <div class="host-label">صاحب العقار</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js?v=20260628-absolute-nav"></script>
<script src="js/navbar.js?v=20260628-live-fixes"></script>
<script>
const typeMap   = {apartment:'شقة',villa:'فيلا',land:'أرض',chalet:'شاليه',commercial:'تجاري',parking:'موقف'};
const damageMap = {intact:'سليم',partial:'أضرار جزئية',renovated:'مرمم'};
const params    = new URLSearchParams(window.location.search);
const propId    = params.get('id');
const role = localStorage.getItem('role');
const browsePage = role === 'tenant' ? 'tenant-properties.html' : role === 'host' ? 'host-properties.html' : 'properties.html';

document.getElementById('breadcrumb-properties').href = browsePage;

if(!propId) window.location.href = browsePage;

async function loadProperty(){
    const r = await fetch(`${BASE_URL}/properties/${propId}`,{headers:{'Accept':'application/json'}});
    if(!r.ok){ window.location.href=browsePage; return; }
    const p = await r.json();
    render(p);
    loadReviews();
    loadWhatsapp();
}

function render(p){
    document.title = `حمى | ${p.title}`;
    document.getElementById('breadcrumb-title').textContent = p.title;
    document.getElementById('title').textContent = p.title;

    const loc = [p.governorate?.name, p.city?.name, p.neighborhood?.name, p.street].filter(Boolean).join(' - ');
    document.getElementById('location').textContent = loc || 'غير محدد';
    document.getElementById('type-badge').textContent = typeMap[p.type]||p.type;
    document.getElementById('price').textContent = Number(p.price).toLocaleString('ar');
    document.getElementById('description').textContent = p.description || 'لا يوجد وصف متاح';

    // Gallery
    if(p.images?.length){
        const main = p.images.find(i=>i.is_main)||p.images[0];
        document.getElementById('main-img').innerHTML = `<img src="${main.url}" alt="${p.title}">`;
        const thumbs = document.getElementById('thumbs');
        p.images.forEach((img,i)=>{
            thumbs.innerHTML += `<div class="thumb ${i===0?'active':''}" onclick="switchImg('${img.url}',this)">
                <img src="${img.url}" alt="">
            </div>`;
        });
        thumbs.classList.toggle('single', p.images.length === 1);
    }

    // Specs
    const specs = [
        p.rooms     ? `<div class="spec-item"><i class="fas fa-door-open"></i><div class="val">${p.rooms}</div><div class="lbl">غرفة</div></div>` : '',
        p.area_m2   ? `<div class="spec-item"><i class="fas fa-ruler-combined"></i><div class="val">${p.area_m2}</div><div class="lbl">م²</div></div>` : '',
        `<div class="spec-item"><i class="fas fa-hard-hat"></i><div class="val">${damageMap[p.damage_status]||p.damage_status}</div><div class="lbl">الحالة</div></div>`,
    ];
    document.getElementById('specs').innerHTML = specs.join('');

    // Services
    const svc = [
        `<span class="service-badge ${p.has_water?'':'off'}"><i class="fas fa-tint"></i>${p.has_water?'ماء متاح':'لا يوجد ماء'}</span>`,
        `<span class="service-badge ${p.has_electricity?'':'off'}"><i class="fas fa-bolt"></i>${p.has_electricity?'كهرباء متاحة':'لا تيار كهربائي'}</span>`,
        `<span class="service-badge ${p.is_ready?'':'off'}"><i class="fas fa-check-circle"></i>${p.is_ready?'جاهز للسكن':'غير جاهز'}</span>`,
    ];
    document.getElementById('services').innerHTML = svc.join('');

    // Host
    if(p.host){
        document.getElementById('host-info').innerHTML = `
            <div class="host-avatar">${p.host.first_name?.charAt(0)||'H'}</div>
            <div>
                <div class="host-name">${p.host.first_name||''} ${p.host.last_name||''}</div>
                <div class="host-label">صاحب العقار</div>
            </div>`;
    }

    // Book button
    const role  = localStorage.getItem('role');
    const token = localStorage.getItem('token');
    const btn   = document.getElementById('btn-book');
    if(!token){ btn.textContent='احجز الآن'; }
    else if(role!=='tenant'){ btn.disabled=true; btn.textContent='متاح للمستأجرين فقط'; }
}

function switchImg(url, el){
    document.getElementById('main-img').innerHTML = `<img src="${url}" alt="">`;
    document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
}

async function loadReviews(){
    const r = await fetch(`${BASE_URL}/properties/${propId}/reviews`,{headers:{'Accept':'application/json'}});
    const data = await r.json();
    const list = document.getElementById('reviews-list');
    if(!data.length){ list.innerHTML='<p style="color:#6B7280;font-size:0.85rem;">لا توجد تقييمات بعد</p>'; return; }
    list.innerHTML = data.map(rv=>`
        <div class="review-item">
            <div class="review-header">
                <span class="reviewer-name">${rv.reviewer?.first_name||'مستخدم'}</span>
                <span class="stars">${'★'.repeat(rv.rating)}${'☆'.repeat(5-rv.rating)}</span>
            </div>
            <div class="review-text">${rv.comment||'بدون تعليق'}</div>
        </div>`).join('');
}

async function loadWhatsapp(){
    const r = await fetch(`${BASE_URL}/properties/${propId}/whatsapp`,{headers:{'Accept':'application/json'}});
    if(r.ok){
        const data = await r.json();
        document.getElementById('btn-whatsapp').href = data.whatsapp_link;
    } else {
        document.getElementById('btn-whatsapp').style.display = 'none';
    }
}

function handleBook(){
    const token = localStorage.getItem('token');
    const bookingUrl = `booking-form.html?id=${propId}`;
    if(!token){
        localStorage.setItem('redirect_after_login', bookingUrl);
        window.location.href = `tenant-login.html?redirect=${encodeURIComponent(bookingUrl)}`;
        return;
    }
    if(localStorage.getItem('role') !== 'tenant'){
        return;
    }
    const complete = localStorage.getItem('is_profile_complete')==='true';
    if(!complete){
        localStorage.setItem('redirect_after_complete', bookingUrl);
        window.location.href='complete-profile.html';
        return;
    }
    window.location.href=bookingUrl;
}

loadProperty();
</script>
</body>
</html>
