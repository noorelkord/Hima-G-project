<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حمى | إدارة الحجوزات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
    <style>
        body{margin:0;background:#F8F5F0;}
        .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
        .sidebar{background:#0D2B1F;padding:1.5rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
        .sidebar-logo{font-size:1.4rem;font-weight:900;color:#D4A853;padding:0 1.2rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .sidebar-logo span{color:white;font-weight:300;font-size:0.85rem;display:block;}
        .sidebar-user{padding:0.8rem 1.2rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .user-avatar{width:44px;height:44px;border-radius:50%;background:#C0392B;border:2px solid #D4A853;display:flex;align-items:center;justify-content:center;color:white;font-size:1.1rem;font-weight:700;margin-bottom:0.5rem;}
        .user-name{color:white;font-size:0.9rem;font-weight:700;}
        .user-role{color:rgba(255,255,255,0.4);font-size:0.75rem;}
        .nav-section{font-size:0.68rem;color:rgba(255,255,255,0.3);padding:1rem 1.2rem 0.4rem;text-transform:uppercase;letter-spacing:0.8px;}
        .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.6);cursor:pointer;transition:all 0.2s;font-size:0.875rem;text-decoration:none;border-right:3px solid transparent;}
        .nav-item:hover{color:white;background:rgba(255,255,255,0.05);}
        .nav-item.active{color:#D4A853;background:rgba(212,168,83,0.1);border-right-color:#D4A853;}
        .nav-item i{width:18px;text-align:center;}
        .btn-logout{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.4);cursor:pointer;font-size:0.875rem;background:none;border:none;font-family:'Cairo',sans-serif;width:100%;text-align:right;margin-top:1rem;}
        .btn-logout:hover{color:#E74C3C;}
        .main{padding:2rem;}
        .page-header,.tabs,#list{max-width:1100px;margin-left:auto;margin-right:auto;}
        .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap;}
        .page-title{font-size:1.5rem;font-weight:900;color:#1B4332;}
        .btn-archive-stale{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;border-radius:10px;padding:0.6rem 1.2rem;font-family:'Cairo',sans-serif;font-weight:700;font-size:0.875rem;cursor:pointer;width:auto !important;flex:0 0 auto;}
        .btn-archive-stale:hover{background:#FDE68A;}

        .tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
        .tabs .tab{padding:0.5rem 1.2rem;border-radius:20px;font-size:0.85rem;font-weight:600;cursor:pointer;border:1.5px solid #E5E0D8;background:white;color:#6B7280;font-family:'Cairo',sans-serif;width:auto !important;flex:1 1 0;min-width:0;}
        .tab.active{background:#1B4332;color:white;border-color:#1B4332;}

        .booking-card{background:#fff;border-radius:16px;border:1px solid #E9E4DB;padding:1rem;margin-bottom:1rem;display:flex;gap:1.2rem;align-items:stretch;transition:box-shadow 0.2s,transform 0.2s,border-color 0.2s;cursor:pointer;}
        .booking-card:hover{box-shadow:0 12px 30px rgba(27,67,50,0.10);border-color:#D9D2C6;transform:translateY(-2px);}
        .prop-thumb{width:160px;min-width:160px;height:120px;border-radius:12px;background:linear-gradient(135deg,#1B4332,#2D6A4F);overflow:hidden;flex-shrink:0;}
        .prop-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
        .prop-thumb .no-img{display:flex;align-items:center;justify-content:center;height:100%;font-size:2rem;color:rgba(255,255,255,0.25);}
        .booking-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:0.55rem;}
        .booking-name{font-weight:800;font-size:1.05rem;color:#16241C;line-height:1.35;}
        .booking-meta{display:flex;flex-wrap:wrap;gap:0.45rem;}
        .meta-chip{display:inline-flex;align-items:center;gap:0.35rem;background:#F4F1EB;color:#4B5563;font-size:0.78rem;font-weight:600;padding:0.32rem 0.72rem;border-radius:999px;white-space:nowrap;}
        .meta-chip i{font-size:0.72rem;color:#2D6A4F;}
        .meta-chip.price{background:#EAF5EF;color:#1B4332;}
        .meta-chip.privacy{background:#FEF9EC;color:#92400E;}
        .booking-side{display:flex;flex-direction:column;align-items:flex-start;justify-content:space-between;gap:0.8rem;min-width:150px;padding-right:1.2rem;border-right:1px solid #F0ECE4;}

        .badge{font-size:0.74rem;font-weight:800;padding:0.32rem 0.85rem;border-radius:999px;white-space:nowrap;}
        .badge-pending{background:#FEF3C7;color:#92400E;}
        .badge-accepted{background:#D1FAE5;color:#065F46;}
        .badge-rejected{background:#FEE2E2;color:#991B1B;}
        .badge-cancelled{background:#F3F4F6;color:#374151;}

        .booking-actions{display:flex;flex-wrap:wrap;gap:0.5rem;width:100%;}
        .btn-archive-row{background:#F3F4F6;color:#6B7280;border:1px solid #E5E0D8;border-radius:9px;padding:0.45rem 0.95rem;font-family:'Cairo',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:0.35rem;width:auto !important;}
        .btn-archive-row:hover{background:#E5E0D8;}

        .empty-state{text-align:center;padding:3rem;color:#6B7280;}
        .empty-state i{font-size:2.5rem;color:#E5E0D8;display:block;margin-bottom:1rem;}

        .toast{position:fixed;bottom:2rem;left:2rem;background:#1B4332;color:white;padding:0.9rem 1.4rem;border-radius:10px;font-size:0.9rem;z-index:9999;display:none;align-items:center;gap:0.5rem;}
        .toast.show{display:flex;}
        @media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}}
        @media(max-width:640px){.main{padding:1.2rem;}.tabs{flex-direction:column;}.booking-card{flex-direction:column;}.prop-thumb{width:100%;min-width:0;height:170px;}.booking-side{flex-direction:row;align-items:center;width:100%;justify-content:space-between;border-right:none;border-top:1px solid #F0ECE4;padding-right:0;padding-top:0.8rem;}}
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">حمى <span>لوحة الإدارة</span></div>
        <div class="sidebar-user">
            <div class="user-avatar" id="avatar">A</div>
            <div class="user-name" id="sidebar-name">...</div>
            <div class="user-role">مشرف النظام</div>
        </div>
        <div class="nav-section">الإدارة</div>
        <a class="nav-item" href="admin-dashboard.html"><i class="fas fa-th-large"></i> لوحة التحكم</a>
        <a class="nav-item" href="admin-properties.html"><i class="fas fa-building"></i> إدارة العقارات</a>
        <a class="nav-item active" href="admin-bookings.html"><i class="fas fa-calendar-check"></i> إدارة الحجوزات</a>
        <a class="nav-item" href="admin-contracts.html"><i class="fas fa-file-contract"></i> عقود المنصة</a>
        <div class="nav-section">النظام</div>
        <a class="nav-item" href="notifications.html?v=role-sidebar"><i class="fas fa-bell"></i> الإشعارات</a>
        <a class="nav-item" href="profile.html?v=role-sidebar"><i class="fas fa-user-cog"></i> الملف الشخصي</a>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </aside>

    <main class="main">
        <div class="page-header">
            <div class="page-title"><i class="fas fa-calendar-check me-2"></i>إدارة الحجوزات</div>
            <button class="btn-archive-stale" onclick="archiveStale()">
                <i class="fas fa-archive me-1"></i> أرشفة المعلقة +48 ساعة
            </button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="filterTab('all',this)">الكل</button>
            <button class="tab" onclick="filterTab('pending',this)">معلق</button>
            <button class="tab" onclick="filterTab('accepted',this)">مقبول</button>
            <button class="tab" onclick="filterTab('rejected',this)">مرفوض</button>
            <button class="tab" onclick="filterTab('cancelled',this)">ملغي</button>
        </div>

        <div id="list">
            <div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div>
        </div>
    </main>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toast-msg"></span></div>

<script src="js/api.js?v=20260628-absolute-nav"></script>
<script>
const statusMap={pending:'معلق',accepted:'مقبول',rejected:'مرفوض',cancelled:'ملغي'};
const statusCls={pending:'badge-pending',accepted:'badge-accepted',rejected:'badge-rejected',cancelled:'badge-cancelled'};
let allBookings=[],currentTab='all';

async function init(){
    requireRole('admin', 'admin-login.html');
    const name=localStorage.getItem('name')||'';
    document.getElementById('sidebar-name').textContent=name;
    document.getElementById('avatar').textContent=name.charAt(0)||'A';
    try{
        const r=await fetch(BASE_URL+'/admin/bookings',{headers:authHeaders()});
        const data=await r.json();
        if(!r.ok) throw new Error(data.message||'تعذر تحميل الحجوزات');
        allBookings=Array.isArray(data)?data:[];
        render(allBookings);
    }catch(err){
        document.getElementById('list').innerHTML=`<div class="empty-state"><i class="fas fa-circle-exclamation"></i><p>تعذر تحميل الحجوزات</p></div>`;
    }
}

function openBooking(e,id){
    if(e.target.closest('button')) return;
    goToPage('admin-booking-details.html?id='+id);
}

function filterTab(status,el){
    currentTab=status;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    render(status==='all'?allBookings:allBookings.filter(b=>b.status===status));
}

function render(list){
    const el=document.getElementById('list');
    if(!list.length){el.innerHTML=`<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد حجوزات</p></div>`;return;}
    el.innerHTML=list.map(b=>{
        const main=b.property?.images?.find(i=>i.is_main && i.url)||b.property?.images?.find(i=>i.url);
        const img=main?.url?`<img src="${main.url}" alt="" onerror="this.parentElement.innerHTML='<div class=&quot;no-img&quot;><i class=&quot;fas fa-building&quot;></i></div>'">`:`<div class="no-img"><i class="fas fa-building"></i></div>`;
        return `<div class="booking-card" onclick="openBooking(event,${b.id})">
            <div class="prop-thumb">${img}</div>
            <div class="booking-body">
                <div class="booking-name">${b.property?.title||'عقار'}</div>
                <div class="booking-meta">
                    <span class="meta-chip"><i class="fas fa-map-marker-alt"></i>${b.property?.governorate?.name||'غير محدد'}</span>
                    <span class="meta-chip"><i class="fas fa-user"></i>المستأجر: ${b.tenant?.first_name||'—'}</span>
                    <span class="meta-chip"><i class="fas fa-calendar-alt"></i>${b.start_date?.split('T')[0]||''} → ${b.end_date?.split('T')[0]||''}</span>
                    <span class="meta-chip price"><i class="fas fa-money-bill-wave"></i>${Number(b.price||0).toLocaleString('ar')} ₪</span>
                    <span class="meta-chip privacy"><i class="fas fa-shield-halved"></i>بيانات المستأجر مخفية</span>
                </div>
            </div>
            <div class="booking-side">
                <span class="badge ${statusCls[b.status]||''}">${statusMap[b.status]||b.status}</span>
                <div class="booking-actions">
                    <button class="btn-archive-row" onclick="event.stopPropagation();archiveOne(${b.id})"><i class="fas fa-archive"></i>أرشفة</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

async function archiveOne(id){
    if(!confirm('أرشفة هذا الحجز؟')) return;
    const r=await fetch(`${BASE_URL}/admin/bookings/${id}`,{method:'DELETE',headers:authHeaders()});
    if(r.ok){allBookings=allBookings.filter(b=>b.id!==id);filterTab(currentTab,document.querySelector('.tab.active'));showToast('تم أرشفة الحجز');}
}

async function archiveStale(){
    if(!confirm('هل تريد أرشفة جميع الحجوزات المعلقة منذ أكثر من 48 ساعة؟')) return;
    const r=await fetch(`${BASE_URL}/admin/bookings/stale`,{method:'DELETE',headers:authHeaders()});
    if(r.ok){showToast('✅ تم أرشفة الحجوزات المعلقة');init();}
}

function showToast(msg){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
init();
</script>
</body>
</html>
