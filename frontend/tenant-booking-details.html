<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حمى | تفاصيل الحجز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
    <style>
        :root{ --green:#1B4332; --green-2:#2D6A4F; --gold:#D4A853; --bg:#F8F5F0; --border:#ECE7DD; --line:#F3F0E9; --ink:#16241C; --muted:#6B7280; --soft:#9CA3AF; }
        *{box-sizing:border-box;}
        body{margin:0;background:var(--bg);font-family:'Cairo',sans-serif;}
        .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
        .sidebar{background:#0D2B1F;padding:1.5rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
        .sidebar-logo{font-size:1.4rem;font-weight:900;color:var(--gold);padding:0 1.2rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .sidebar-logo span{color:white;font-weight:300;font-size:0.85rem;display:block;}
        .sidebar-user{padding:0.8rem 1.2rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;}
        .user-avatar{width:44px;height:44px;border-radius:50%;background:#1B4332;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:1.1rem;font-weight:700;margin-bottom:0.5rem;}
        .user-name{color:white;font-size:0.9rem;font-weight:700;}
        .user-role{color:rgba(255,255,255,0.4);font-size:0.75rem;}
        .nav-section{font-size:0.68rem;color:rgba(255,255,255,0.3);padding:1rem 1.2rem 0.4rem;text-transform:uppercase;letter-spacing:0.8px;}
        .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.6);cursor:pointer;transition:all 0.2s;font-size:0.875rem;text-decoration:none;border-right:3px solid transparent;}
        .nav-item:hover{color:white;background:rgba(255,255,255,0.05);}
        .nav-item.active{color:var(--gold);background:rgba(212,168,83,0.1);border-right-color:var(--gold);}
        .nav-item i{width:18px;text-align:center;}
        .btn-logout{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;color:rgba(255,255,255,0.4);cursor:pointer;font-size:0.875rem;background:none;border:none;font-family:'Cairo',sans-serif;width:100%;text-align:right;margin-top:1rem;}
        .btn-logout:hover{color:#E74C3C;}

        .main{padding:2.2rem 1.5rem 3rem;display:flex;justify-content:center;}
        .wrap{width:100%;max-width:880px;}

        .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;gap:1rem;flex-wrap:wrap;}
        .back-link{display:inline-flex;align-items:center;gap:0.5rem;color:var(--green-2);font-weight:700;font-size:0.875rem;text-decoration:none;}
        .back-link:hover{color:var(--green);}
        .ref{font-size:0.8rem;color:var(--soft);font-weight:700;}

        /* Hero */
        .hero{background:linear-gradient(135deg,#0D2B1F,#1B4332);border-radius:18px;padding:1.6rem 1.8rem;color:white;margin-bottom:1.2rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;}
        .hero-info h1{margin:0;font-size:1.3rem;font-weight:900;display:flex;align-items:center;gap:0.5rem;}
        .hero-info h1 i{color:var(--gold);}
        .hero-info p{margin:0.3rem 0 0;color:rgba(255,255,255,0.75);font-size:0.875rem;display:flex;align-items:center;gap:0.4rem;}

        .badge{font-size:0.78rem;font-weight:800;padding:0.4rem 1rem;border-radius:999px;white-space:nowrap;}
        .badge-pending{background:rgba(254,243,199,0.95);color:#92400E;}
        .badge-accepted{background:rgba(209,250,229,0.95);color:#065F46;}
        .badge-rejected{background:rgba(254,226,226,0.95);color:#991B1B;}
        .badge-cancelled{background:rgba(243,244,246,0.95);color:#374151;}

        /* KPIs */
        .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.2rem;}
        .kpi{background:white;border:1px solid var(--border);border-radius:16px;padding:1.1rem;text-align:center;}
        .kpi .ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.5rem;font-size:1rem;}
        .kpi .ico.green{background:#EAF5EF;color:var(--green-2);}
        .kpi .ico.gold{background:#FBF1DA;color:#B7821F;}
        .kpi .ico.blue{background:#E7F0FB;color:#2563EB;}
        .kpi .val{font-size:1.1rem;font-weight:900;color:var(--ink);line-height:1.1;}
        .kpi .lbl{font-size:0.74rem;color:var(--muted);margin-top:0.2rem;}

        /* Cards */
        .card{background:white;border:1px solid var(--border);border-radius:16px;padding:1.3rem;margin-bottom:1rem;}
        .card h3{font-size:0.95rem;font-weight:800;color:var(--green);margin:0 0 0.9rem;display:flex;align-items:center;gap:0.5rem;padding-bottom:0.6rem;border-bottom:2px solid var(--line);}

        .info-row{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:0.65rem 0;border-bottom:1px solid var(--line);}
        .info-row:last-child{border-bottom:none;padding-bottom:0;}
        .info-label{font-size:0.82rem;color:var(--muted);display:flex;align-items:center;gap:0.5rem;}
        .info-label i{color:var(--soft);width:16px;text-align:center;}
        .info-value{font-size:0.88rem;font-weight:700;color:var(--ink);}
        .info-value.price{color:var(--green);}

        /* ✅ Action bar للمعلق */
        .action-bar{background:white;border:1px solid var(--border);border-radius:16px;padding:1.1rem 1.3rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
        .action-bar-info{font-size:0.85rem;color:#92400E;background:#FEF9EC;border:1px solid #FDE68A;border-radius:10px;padding:0.6rem 0.9rem;display:flex;align-items:flex-start;gap:0.5rem;line-height:1.6;flex:1;}
        .action-btns{display:flex;gap:0.6rem;flex-wrap:nowrap;flex-shrink:0;}
        .btn-edit{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;border-radius:10px;padding:0.55rem 1.2rem;font-family:'Cairo',sans-serif;font-weight:700;font-size:0.875rem;cursor:pointer;display:inline-flex;align-items:center;gap:0.4rem;white-space:nowrap;transition:background 0.2s;}
        .btn-edit:hover{background:#FDE68A;}
        .btn-cancel{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;border-radius:10px;padding:0.55rem 1.2rem;font-family:'Cairo',sans-serif;font-weight:700;font-size:0.875rem;cursor:pointer;display:inline-flex;align-items:center;gap:0.4rem;white-space:nowrap;transition:background 0.2s;}
        .btn-cancel:hover{background:#FECACA;}
        .btn-contract{background:#D1FAE5;color:#065F46;border:1px solid #BBF7D0;border-radius:10px;padding:0.55rem 1.2rem;font-family:'Cairo',sans-serif;font-weight:700;font-size:0.875rem;cursor:pointer;display:inline-flex;align-items:center;gap:0.4rem;white-space:nowrap;text-decoration:none;}

        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:9999;}
        .modal-overlay.show{display:flex;}
        .modal{background:white;border-radius:16px;padding:1.5rem;width:90%;max-width:420px;}
        .modal h3{font-size:1rem;font-weight:700;color:#C0392B;margin-bottom:0.6rem;}
        .modal p{color:#6B7280;font-size:0.875rem;margin-bottom:1.2rem;}
        .modal-actions{display:flex;gap:0.7rem;}
        .btn-confirm{flex:1;background:#C0392B;color:white;border:none;border-radius:10px;padding:0.7rem;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;}
        .btn-cancel-modal{background:transparent;color:#6B7280;border:1.5px solid #E5E0D8;border-radius:10px;padding:0.7rem 1.2rem;font-family:'Cairo',sans-serif;cursor:pointer;}

        .state{text-align:center;padding:4rem 2rem;color:var(--muted);}
        .state i{font-size:3rem;color:var(--border);display:block;margin-bottom:1rem;}


        /* Host card */
        .host-box{display:flex;align-items:center;gap:0.85rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--line);}
        .host-avatar{width:48px;height:48px;border-radius:50%;background:var(--green);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.2rem;flex-shrink:0;}
        .host-name{font-size:1rem;font-weight:800;color:var(--ink);}
        .host-sub{font-size:0.78rem;color:var(--soft);}
        .host-rating-row{display:flex;align-items:center;gap:0.4rem;font-size:0.82rem;color:#92400E;background:#FEF3C7;padding:0.35rem 0.75rem;border-radius:999px;width:fit-content;}
        .host-rating-row i{color:#D4A853;}

        .grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;align-items:start;}
        .col{display:flex;flex-direction:column;gap:1.2rem;}
        .card.full{grid-column:1/-1;}

        .hero-img{width:100%;height:220px;display:block;object-fit:cover;border-radius:18px 18px 0 0;}
        .hero-noimg{height:180px;display:flex;align-items:center;justify-content:center;font-size:3rem;color:rgba(255,255,255,0.2);}
        .hero-with-img{padding:0;overflow:hidden;}
        .hero-with-img .hero-overlay{padding:1.2rem 1.6rem;background:linear-gradient(to top,rgba(7,24,17,0.9),rgba(7,24,17,0));border-radius:0 0 18px 18px;}
        @media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}.kpis{grid-template-columns:1fr 1fr;}.action-bar{flex-direction:column;}.grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">حمى <span>منصة الإيجار الرقمي</span></div>
        <div class="sidebar-user">
            <div class="user-avatar" id="avatar">م</div>
            <div class="user-name" id="sidebar-name">...</div>
            <div class="user-role">مستأجر</div>
        </div>
        <div class="nav-section">القائمة الرئيسية</div>
        <a class="nav-item" href="dashboard-tenant.html"><i class="fas fa-th-large"></i> لوحة التحكم</a>
        <a class="nav-item" href="tenant-properties.html"><i class="fas fa-search"></i> تصفح العقارات</a>
        <div class="nav-section">حسابي</div>
        <a class="nav-item active" href="my-bookings.html"><i class="fas fa-calendar-check"></i> حجوزاتي</a>
        <a class="nav-item" href="my-contracts.html"><i class="fas fa-file-contract"></i> عقودي</a>
        <a class="nav-item" href="my-favorites.html"><i class="fas fa-heart"></i> مفضلتي</a>
        <a class="nav-item" href="notifications.html?v=role-sidebar"><i class="fas fa-bell"></i> الإشعارات</a>
        <a class="nav-item" href="profile.html?v=role-sidebar"><i class="fas fa-user-cog"></i> الملف الشخصي</a>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </aside>

    <main class="main">
        <div class="wrap">
            <div class="topbar">
                <a class="back-link" href="my-bookings.html"><i class="fas fa-arrow-right"></i> العودة إلى حجوزاتي</a>
                <span class="ref" id="ref"></span>
            </div>
            <div id="content">
                <div class="state"><i class="fas fa-spinner fa-spin"></i><p>جارٍ تحميل تفاصيل الحجز...</p></div>
            </div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="cancel-modal">
    <div class="modal">
        <h3><i class="fas fa-times-circle me-2"></i>إلغاء الحجز</h3>
        <p>هل أنت متأكد من إلغاء هذا الحجز؟ لا يمكن التراجع عن هذا الإجراء.</p>
        <div class="modal-actions">
            <button class="btn-cancel-modal" onclick="closeModal()">تراجع</button>
            <button class="btn-confirm" onclick="confirmCancel()">نعم، إلغاء الحجز</button>
        </div>
    </div>
</div>

<script src="js/api.js?v=20260628-absolute-nav"></script>
<script>
const statusMap = {pending:'معلق',accepted:'مقبول',rejected:'مرفوض',cancelled:'ملغي'};
const statusCls = {pending:'badge-pending',accepted:'badge-accepted',rejected:'badge-rejected',cancelled:'badge-cancelled'};
const bookingId = new URLSearchParams(location.search).get('id');
let currentBooking = null;

function fmtDate(d){
    if(!d) return '—';
    const dt = new Date(String(d).replace(' ','T'));
    if(isNaN(dt)) return String(d).split('T')[0];
    return dt.toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});
}
function days(a,b){
    if(!a||!b) return null;
    const d1=new Date(String(a).split('T')[0]), d2=new Date(String(b).split('T')[0]);
    const n=Math.round((d2-d1)/86400000);
    return n>0?n:null;
}

async function init(){
    requireAuth();
    const name = localStorage.getItem('name')||'';
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('avatar').textContent = name.charAt(0)||'م';

    if(!bookingId){
        document.getElementById('content').innerHTML='<div class="state"><i class="fas fa-exclamation-triangle"></i><p>رقم الحجز غير محدد</p></div>';
        return;
    }

    const r = await fetch(`${BASE_URL}/tenant/bookings/${bookingId}`,{headers:authHeaders()});
    if(!r.ok){
        document.getElementById('content').innerHTML='<div class="state"><i class="fas fa-circle-xmark"></i><p>تعذّر العثور على الحجز</p></div>';
        return;
    }
    currentBooking = await r.json();
    render(currentBooking);
}

function render(b){
    const p = b.property||{};
    const loc = [p.governorate?.name, p.city?.name, p.neighborhood?.name, p.street].filter(Boolean).join(' - ')||'غير محدد';
    const n = days(b.start_date, b.end_date);
    const isPending = b.status === 'pending';

    document.getElementById('ref').textContent = 'حجز رقم: #'+b.id;

    // ✅ بناء الـ hero بشكل منفصل لتجنب تعارض الـ backticks
    const imgs = p.images||[];
    const mainImg = imgs.find(i=>i.is_main&&i.url)||imgs.find(i=>i.url);
    // ✅ إظهار رابط "عرض العقار" فقط إذا كان العقار متاح للعموم

    const heroContent = '<div class="hero-info"><h1><i class="fas fa-receipt"></i> حجز #'+b.id+'</h1><p><i class="fas fa-home"></i> '+(p.title||'عقار')+'</p><p><i class="fas fa-map-marker-alt"></i> '+loc+'</p></div><span class="badge '+(statusCls[b.status]||'')+'">'+( statusMap[b.status]||b.status)+'</span>';
    const heroHtml = mainImg?.url
        ? '<div class="hero hero-with-img"><img class="hero-img" src="'+mainImg.url+'" alt="" onerror="this.style.display=\'none\'"><div class="hero-overlay" style="display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;flex-wrap:wrap;">'+heroContent+'</div></div>'
        : '<div class="hero">'+heroContent+'</div>';

    document.getElementById('content').innerHTML = heroHtml + `

        ${isPending ? `
        <div class="action-bar">
            <div class="action-bar-info">
                <i class="fas fa-info-circle" style="margin-top:0.2rem;flex-shrink:0;"></i>
                <span>طلبك قيد المراجعة من المضيف. يمكنك تعديل <strong>تواريخ الإقامة فقط</strong> طالما الطلب معلق.</span>
            </div>
            <div class="action-btns">
                <button class="btn-edit" onclick="window.location.href='booking-form.html?id=${p.id}&edit=true&booking_id=${b.id}'"><i class="fas fa-pen"></i> تعديل التواريخ</button>
                <button class="btn-cancel" onclick="document.getElementById('cancel-modal').classList.add('show')"><i class="fas fa-times"></i> إلغاء</button>
            </div>
        </div>` : ''}

        ${b.status==='accepted'&&b.contract_id ? `
        <div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:12px;padding:0.9rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
            <span style="font-size:0.85rem;color:#065F46;display:flex;align-items:center;gap:0.5rem;"><i class="fas fa-file-contract"></i> تم إنشاء عقد إلكتروني لهذا الحجز</span>
            <a class="btn-contract" href="my-contracts.html"><i class="fas fa-eye"></i> عرض العقد</a>
        </div>` : ''}

        <div class="kpis">
            <div class="kpi">
                <div class="ico green"><i class="fas fa-money-bill-wave"></i></div>
                <div class="val">${Number(b.property?.price||b.price||0).toLocaleString('ar')} ₪</div>
                <div class="lbl">سعر الإعلان / شهرياً</div>
            </div>
            <div class="kpi">
                <div class="ico gold"><i class="fas fa-calendar-alt"></i></div>
                <div class="val" style="font-size:0.95rem;">${b.duration_text||'—'}</div>
                <div class="lbl">مدة الإقامة</div>
            </div>
            <div class="kpi">
                <div class="ico blue"><i class="fas fa-calendar-day"></i></div>
                <div class="val" style="font-size:0.88rem;">${fmtDate(b.start_date)}</div>
                <div class="lbl">تاريخ الوصول</div>
            </div>
        </div>

        <div class="grid">
            <div class="col">
                <div class="card">
                    <h3><i class="fas fa-calendar-days"></i> تفاصيل الحجز</h3>
                    <div class="info-row"><span class="info-label"><i class="fas fa-receipt"></i>رقم الحجز</span><span class="info-value">#${b.id}</span></div>
                    <div class="info-row"><span class="info-label"><i class="fas fa-calendar-plus"></i>تاريخ الوصول</span><span class="info-value">${fmtDate(b.start_date)}</span></div>
                    <div class="info-row"><span class="info-label"><i class="fas fa-calendar-minus"></i>تاريخ المغادرة</span><span class="info-value">${fmtDate(b.end_date)}</span></div>
                    ${Number(b.price) < Number(b.property?.price||b.price) ?
                        `<div class="info-row"><span class="info-label"><i class="fas fa-money-bill-wave"></i>سعر الحجز المتفق عليه</span><span class="info-value price">${Number(b.price||0).toLocaleString('ar')} ₪ <span style="font-size:0.78rem;color:#6B7280;font-weight:400;">/ شهرياً</span> <span style="font-size:0.75rem;color:#D4A853;margin-right:0.3rem;"><i class="fas fa-tag"></i> سعر مخفض</span></span></div>` :
                        `<div class="info-row"><span class="info-label"><i class="fas fa-money-bill-wave"></i>سعر الحجز المتفق عليه</span><span class="info-value price">${Number(b.price||0).toLocaleString('ar')} ₪ <span style="font-size:0.78rem;color:#6B7280;font-weight:400;">/ شهرياً</span></span></div>`
                    }
                    ${b.total ? `<div class="info-row"><span class="info-label"><i class="fas fa-calculator"></i>الإجمالي للمدة كاملة</span><span class="info-value price">${Number(b.total).toLocaleString('ar')} ₪</span></div>` : ''}
                    <div class="info-row"><span class="info-label"><i class="fas fa-clock"></i>تاريخ الطلب</span><span class="info-value">${fmtDate(b.created_at)}</span></div>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <h3><i class="fas fa-user-tie"></i> بيانات المضيف</h3>
                    ${p.host ? `
                    <div class="host-box">
                        <div class="host-avatar">${p.host.first_name?.charAt(0)||'H'}</div>
                        <div>
                            <div class="host-name">${p.host.first_name||''} ${p.host.last_name||''}</div>
                            <div class="host-sub">صاحب العقار</div>
                        </div>
                    </div>
                    ${p.host_rating && p.host_reviews_count > 0 ? `
                    <div class="info-row">
                        <span class="info-label"><i class="fas fa-star"></i>تقييم المضيف</span>
                        <span class="info-value"><span class="host-rating-row"><i class="fas fa-star"></i>${p.host_rating} <span style="color:#6B7280;font-weight:400;">(${p.host_reviews_count} تقييم)</span></span></span>
                    </div>` : `
                    <div class="info-row">
                        <span class="info-label"><i class="fas fa-star"></i>تقييم المضيف</span>
                        <span class="info-value" style="color:#9CA3AF;">لا توجد تقييمات بعد</span>
                    </div>`}
                    ` : '<p style="color:#9CA3AF;font-size:0.85rem;">لا تتوفر بيانات المضيف</p>'}
                </div>

                <div class="card">
                    <h3><i class="fas fa-home"></i> بيانات العقار</h3>
                    <div class="info-row"><span class="info-label"><i class="fas fa-shapes"></i>النوع</span><span class="info-value">${{apartment:'شقة',villa:'فيلا',land:'أرض',chalet:'شاليه',commercial:'تجاري',parking:'موقف'}[p.type]||p.type||'—'}</span></div>
                    <div class="info-row"><span class="info-label"><i class="fas fa-map-marker-alt"></i>الموقع</span><span class="info-value">${loc}</span></div>
                    ${p.rooms ? `<div class="info-row"><span class="info-label"><i class="fas fa-door-open"></i>الغرف</span><span class="info-value">${p.rooms} غرفة</span></div>` : ''}
                    ${p.area_m2 ? `<div class="info-row"><span class="info-label"><i class="fas fa-ruler-combined"></i>المساحة</span><span class="info-value">${p.area_m2} م²</span></div>` : ''}
                    ${p.damage_status ? `<div class="info-row"><span class="info-label"><i class="fas fa-hard-hat"></i>الحالة</span><span class="info-value">${{intact:'سليم',partial:'أضرار جزئية',renovated:'مرمم'}[p.damage_status]||p.damage_status}</span></div>` : ''}
                    ${p.has_water !== undefined ? `<div class="info-row"><span class="info-label"><i class="fas fa-tint"></i>ماء</span><span class="info-value">${p.has_water ? 'متاح' : 'غير متاح'}</span></div>` : ''}
                    ${p.has_electricity !== undefined ? `<div class="info-row"><span class="info-label"><i class="fas fa-bolt"></i>كهرباء</span><span class="info-value">${p.has_electricity ? 'متاحة' : 'غير متاحة'}</span></div>` : ''}
                </div>

            </div>
        </div>`;
}

function closeModal(){ document.getElementById('cancel-modal').classList.remove('show'); }

async function confirmCancel(){
    closeModal();
    const r = await fetch(`${BASE_URL}/tenant/bookings/${bookingId}`,{method:'DELETE',headers:authHeaders()});
    if(r.ok){
        window.location.href = 'my-bookings.html';
    }
}

init();
</script>
</body>
</html>
