<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حمى | طلبات الحجز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
    <style>
        body { margin:0; background:#F8F5F0; }
        .layout { display:grid; grid-template-columns:240px 1fr; min-height:100vh; }
        .sidebar { background:#0D2B1F; padding:1.5rem 0; position:sticky; top:0; height:100vh; overflow-y:auto; }
        .sidebar-logo { font-size:1.4rem; font-weight:900; color:#D4A853; padding:0 1.2rem 1.5rem; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:1rem; }
        .sidebar-logo span { color:white; font-weight:300; font-size:0.85rem; display:block; }
        .sidebar-user { padding:0.8rem 1.2rem 1.2rem; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:1rem; }
        .user-avatar { width:44px; height:44px; border-radius:50%; background:#1B4332; border:2px solid #D4A853; display:flex; align-items:center; justify-content:center; color:#D4A853; font-size:1.1rem; font-weight:700; margin-bottom:0.5rem; }
        .user-name { color:white; font-size:0.9rem; font-weight:700; }
        .user-role { color:rgba(255,255,255,0.4); font-size:0.75rem; }
        .nav-section { font-size:0.68rem; color:rgba(255,255,255,0.3); padding:1rem 1.2rem 0.4rem; text-transform:uppercase; letter-spacing:0.8px; }
        .nav-item { display:flex; align-items:center; gap:0.7rem; padding:0.7rem 1.2rem; color:rgba(255,255,255,0.6); cursor:pointer; transition:all 0.2s; font-size:0.875rem; text-decoration:none; border-right:3px solid transparent; }
        .nav-item:hover { color:white; background:rgba(255,255,255,0.05); }
        .nav-item.active { color:#D4A853; background:rgba(212,168,83,0.1); border-right-color:#D4A853; }
        .nav-item i { width:18px; text-align:center; }
        .btn-logout { display:flex; align-items:center; gap:0.7rem; padding:0.7rem 1.2rem; color:rgba(255,255,255,0.4); cursor:pointer; font-size:0.875rem; background:none; border:none; font-family:'Cairo',sans-serif; width:100%; text-align:right; margin-top:1rem; }
        .btn-logout:hover { color:#E74C3C; }
        .main { padding:2rem; }
        .page-title { display:flex; align-items:center; gap:0.6rem; font-size:1.5rem; font-weight:900; color:#1B4332; margin-bottom:1.5rem; }
        .page-title i { flex-shrink:0; }
        .tabs { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:0.75rem; margin-bottom:1.5rem; }
        .tab { min-height:44px; width:100%; padding:0.5rem 1.2rem; border-radius:20px; font-size:0.85rem; font-weight:600; cursor:pointer; border:1.5px solid #E5E0D8; background:white; color:#6B7280; font-family:'Cairo',sans-serif; display:flex; align-items:center; justify-content:center; gap:0.35rem; }
        .tab.active { background:#1B4332; color:white; border-color:#1B4332; }
        #pending-count { display:none; align-items:center; justify-content:center; min-width:18px; height:18px; background:#D4A853; color:#1B4332; font-size:0.65rem; padding:1px 6px; border-radius:10px; }
        #pending-count:not(:empty) { display:inline-flex; }

        .booking-card { background:white; border-radius:14px; border:1px solid #E5E0D8; padding:1.3rem; margin-bottom:0.9rem; transition:box-shadow 0.2s; cursor:pointer; }
        .booking-card:hover { box-shadow:0 4px 16px rgba(27,67,50,0.1); }
        .booking-top { display:flex; gap:1rem; align-items:flex-start; }
        .prop-thumb { width:90px; height:68px; border-radius:10px; background:linear-gradient(135deg,#1B4332,#2D6A4F); overflow:hidden; flex-shrink:0; }
        .prop-thumb img { width:100%; height:100%; object-fit:cover; }
        .prop-thumb .no-img { display:flex; align-items:center; justify-content:center; height:100%; font-size:1.5rem; color:rgba(255,255,255,0.2); }
        .booking-main { flex:1; min-width:0; }
        .prop-name { font-weight:700; font-size:0.95rem; color:#1A1A1A; margin-bottom:0.3rem; }
        .tenant-name { font-size:0.82rem; color:#6B7280; margin-bottom:0.3rem; display:flex; align-items:center; gap:0.4rem; }
        .booking-dates { font-size:0.8rem; color:#6B7280; display:flex; align-items:center; gap:0.4rem; margin-bottom:0.3rem; }
        .booking-price { font-weight:700; color:#1B4332; font-size:0.9rem; }
        .badge { font-size:0.72rem; font-weight:700; padding:0.25rem 0.7rem; border-radius:12px; flex-shrink:0; }
        .badge-pending  { background:#FEF3C7; color:#92400E; }
        .badge-accepted { background:#D1FAE5; color:#065F46; }
        .badge-rejected { background:#FEE2E2; color:#991B1B; }
        .badge-cancelled{ background:#F3F4F6; color:#374151; }

        .booking-footer { display:flex; justify-content:space-between; align-items:center; margin-top:1rem; padding-top:0.9rem; border-top:1px solid #F3F4F6; }
        .booking-actions { display:flex; gap:0.6rem; align-items:center; flex-wrap:nowrap; }
        .btn-details { background:#EFF6FF; color:#1D4ED8; border:1px solid #BFDBFE; border-radius:8px; padding:0.45rem 1rem; font-family:'Cairo',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; transition:background 0.2s; display:inline-flex; align-items:center; gap:0.4rem; white-space:nowrap; }
        .btn-details:hover { background:#DBEAFE; }
        .btn-accept { background:#D1FAE5; color:#065F46; border:1px solid #BBF7D0; border-radius:8px; padding:0.45rem 1.1rem; font-family:'Cairo',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; transition:background 0.2s; white-space:nowrap; display:inline-flex; align-items:center; gap:0.4rem; }
        .btn-accept:hover { background:#A7F3D0; }
        .btn-reject { background:#FEE2E2; color:#991B1B; border:1px solid #FECACA; border-radius:8px; padding:0.45rem 1.1rem; font-family:'Cairo',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; white-space:nowrap; display:inline-flex; align-items:center; gap:0.4rem;white-space:nowrap; }
        .btn-reject:hover { background:#FECACA; }

        /* Discount modal */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:9999; }
        .modal-overlay.show { display:flex; }
        .modal { background:white; border-radius:16px; padding:1.5rem; width:90%; max-width:440px; }
        .modal h3 { font-size:1rem; font-weight:700; color:#1B4332; margin-bottom:0.5rem; }
        .modal p  { color:#6B7280; font-size:0.875rem; margin-bottom:1rem; }
        .price-range-info { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:10px; padding:0.7rem 0.9rem; font-size:0.82rem; color:#065F46; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem; }
        .modal input { width:100%; border:1.5px solid #E5E0D8; border-radius:10px; padding:0.7rem; font-family:'Cairo',sans-serif; font-size:0.9rem; outline:none; margin-bottom:0.5rem; box-sizing:border-box; }
        .modal input:focus { border-color:#2D6A4F; }
        .modal input.error { border-color:#C0392B; }
        .price-error { color:#C0392B; font-size:0.8rem; margin-bottom:0.8rem; display:none; }
        .price-error.show { display:block; }
        .modal-actions { display:flex; gap:0.7rem; }
        .btn-confirm-accept { flex:1; background:#1B4332; color:white; border:none; border-radius:10px; padding:0.7rem; font-family:'Cairo',sans-serif; font-weight:700; cursor:pointer; }
        .btn-cancel-modal   { background:transparent; color:#6B7280; border:1.5px solid #E5E0D8; border-radius:10px; padding:0.7rem 1.2rem; font-family:'Cairo',sans-serif; cursor:pointer; }

        /* Reject modal */
        .modal-reject h3 { color:#C0392B; }
        .modal-reject textarea { width:100%; border:1.5px solid #E5E0D8; border-radius:10px; padding:0.7rem; font-family:'Cairo',sans-serif; font-size:0.875rem; resize:vertical; min-height:80px; margin-bottom:1rem; box-sizing:border-box; outline:none; }
        .modal-reject textarea:focus { border-color:#C0392B; }
        .btn-confirm-reject { flex:1; background:#C0392B; color:white; border:none; border-radius:10px; padding:0.7rem; font-family:'Cairo',sans-serif; font-weight:700; cursor:pointer; }

        .toast { position:fixed; bottom:2rem; left:2rem; background:#1B4332; color:white; padding:0.9rem 1.4rem; border-radius:10px; font-size:0.9rem; z-index:9999; display:none; align-items:center; gap:0.5rem; }
        .toast.show { display:flex; }
        .toast.error { background:#C0392B; }
        .empty-state { text-align:center; padding:3rem; color:#6B7280; }
        .empty-state i { font-size:3rem; color:#E5E0D8; display:block; margin-bottom:1rem; }
        @media(max-width:768px){ .layout{grid-template-columns:1fr;} .sidebar{display:none;} .tabs{grid-template-columns:repeat(2,minmax(0,1fr));} }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">حمى <span>منصة الإيجار الرقمي</span></div>
        <div class="sidebar-user">
            <div class="user-avatar" id="avatar">H</div>
            <div class="user-name" id="sidebar-name">...</div>
            <div class="user-role">صاحب عقار</div>
        </div>
        <div class="nav-section">القائمة الرئيسية</div>
        <a class="nav-item" href="dashboard-host.html"><i class="fas fa-th-large"></i> لوحة التحكم</a>
        <a class="nav-item" href="host-properties.html"><i class="fas fa-search"></i> تصفح المنصة</a>
        <div class="nav-section">إدارة عقاراتي</div>
        <a class="nav-item" href="my-properties.html"><i class="fas fa-building"></i> عقاراتي</a>
        <a class="nav-item" href="property-form.html"><i class="fas fa-plus-circle"></i> إضافة عقار</a>
        <a class="nav-item active" href="host-bookings.html"><i class="fas fa-calendar-check"></i> طلبات الحجز</a>
        <a class="nav-item" href="my-contracts-host.html"><i class="fas fa-file-contract"></i> عقودي</a>
        <div class="nav-section">حسابي</div>
        <a class="nav-item" href="notifications.html?v=role-sidebar"><i class="fas fa-bell"></i> الإشعارات</a>
        <a class="nav-item" href="profile.html?v=role-sidebar"><i class="fas fa-user-cog"></i> الملف الشخصي</a>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </aside>

    <main class="main">
        <div class="page-title"><i class="fas fa-calendar-check"></i><span>طلبات الحجز</span></div>

        <div class="tabs">
            <button class="tab active" onclick="filterTab('all',this)">الكل</button>
            <button class="tab" onclick="filterTab('pending',this)">معلق <span id="pending-count"></span></button>
            <button class="tab" onclick="filterTab('accepted',this)">مقبول</button>
            <button class="tab" onclick="filterTab('rejected',this)">مرفوض</button>
            <button class="tab" onclick="filterTab('cancelled',this)">ملغي</button>
        </div>

        <div id="list"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جارٍ التحميل...</p></div></div>
    </main>
</div>

<!-- Accept Modal -->
<div class="modal-overlay" id="accept-modal">
    <div class="modal">
        <h3><i class="fas fa-check-circle me-2"></i>قبول طلب الحجز</h3>
        <p>يمكنك قبول الحجز بالسعر الأصلي أو تقديم سعر مخفض.</p>
        <div class="price-range-info" id="price-range-info">
            <i class="fas fa-info-circle"></i>
            <span id="price-range-text"></span>
        </div>
        <label style="font-size:0.85rem;font-weight:600;color:#374151;display:block;margin-bottom:0.4rem;">السعر المخفض (اختياري) ₪</label>
        <input type="number" id="discount-price" placeholder="اتركه فارغاً لاستخدام السعر الأصلي" oninput="validatePrice()">
        <div class="price-error" id="price-error"></div>
        <div class="modal-actions">
            <button class="btn-cancel-modal" onclick="closeModals()">إلغاء</button>
            <button class="btn-confirm-accept" onclick="confirmAccept()"><i class="fas fa-check me-1"></i>قبول الحجز</button>
        </div>
    </div>
</div>

<!-- Reject Modal -->
<div class="modal-overlay" id="reject-modal">
    <div class="modal modal-reject">
        <h3><i class="fas fa-times-circle me-2"></i>رفض طلب الحجز</h3>
        <textarea id="reject-reason" placeholder="اكتب سبب الرفض للمستأجر..."></textarea>
        <div class="modal-actions">
            <button class="btn-cancel-modal" onclick="closeModals()">إلغاء</button>
            <button class="btn-confirm-reject" onclick="confirmReject()">تأكيد الرفض</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toast-msg"></span></div>

<script src="js/api.js?v=20260628-absolute-nav"></script>
<script>
const statusMap = {pending:'معلق',accepted:'مقبول',rejected:'مرفوض',cancelled:'ملغي'};
const statusCls = {pending:'badge-pending',accepted:'badge-accepted',rejected:'badge-rejected',cancelled:'badge-cancelled'};
let allBookings=[], actionId=null, currentTab='all', currentBooking=null;

async function init(){
    requireAuth('host-login.html');
    const name = localStorage.getItem('name')||'';
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('avatar').textContent = name.charAt(0)||'H';
    const r = await fetch(BASE_URL+'/host/bookings',{headers:authHeaders()});
    allBookings = await r.json();
    const pendingCount = allBookings.filter(b=>b.status==='pending').length;
    if(pendingCount>0) document.getElementById('pending-count').textContent = pendingCount;
    render(allBookings);

    // فتح modal القبول إذا جاء من لوحة التحكم
const acceptId = new URLSearchParams(location.search).get('accept');
if(acceptId){
    const booking = allBookings.find(b=>b.id===Number(acceptId));
    if(booking) openAccept(booking.id, booking.price);
}
}

function filterTab(status, el){
    currentTab=status;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    render(status==='all'?allBookings:allBookings.filter(b=>b.status===status));
}

function render(list){
    const el=document.getElementById('list');
    if(!list.length){
        el.innerHTML=`<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد طلبات في هذه الفئة</p></div>`; return;
    }
    el.innerHTML = list.map(b=>{
        const main = b.property?.images?.find(i=>i.is_main && i.url)||b.property?.images?.find(i=>i.url);
        const img  = main?.url?`<img src="${main.url}" alt="" onerror="this.parentElement.innerHTML='<div class=&quot;no-img&quot;><i class=&quot;fas fa-building&quot;></i></div>'">`:`<div class="no-img"><i class="fas fa-building"></i></div>`;
        const isPending = b.status==='pending';
        return `
        <div class="booking-card">
            <div class="booking-top">
                <div class="prop-thumb">${img}</div>
                <div class="booking-main">
                    <div class="prop-name">${b.property?.title||'عقار'}</div>
                    <div class="tenant-name"><i class="fas fa-user"></i>${b.tenant?.first_name||'مستأجر'} ${b.tenant?.last_name||''}</div>
                    <div class="booking-dates"><i class="fas fa-calendar-alt"></i>${b.start_date?.split('T')[0]} → ${b.end_date?.split('T')[0]}</div>
                    <div class="booking-price">${Number(b.price||0).toLocaleString('ar')} ₪</div>
                </div>
                <span class="badge ${statusCls[b.status]||''}">${statusMap[b.status]||b.status}</span>
            </div>
            <div class="booking-footer">
                <div style="font-size:0.78rem;color:#9CA3AF;">
                    <i class="fas fa-clock me-1"></i>
                    ${b.created_at?.split('T')[0]||''}
                </div>
                <div class="booking-actions">
                    <button class="btn-details" onclick="event.stopPropagation(); window.location.href='host-booking-details.html?id=${b.id}'">
                        <i class="fas fa-eye"></i> عرض التفاصيل
                    </button>
                    ${isPending?`
                        
                       <button class="btn-accept" onclick="event.stopPropagation(); openAccept(${b.id}, ${b.price})"><i class="fas fa-check"></i> قبول</button>
                       <button class="btn-reject" onclick="event.stopPropagation(); openReject(${b.id})"><i class="fas fa-times"></i> رفض</button>
                    `:''}
                    ${b.status==='accepted'?`<div style="font-size:0.8rem;color:#065F46;white-space:nowrap;display:inline-flex;align-items:center;gap:0.4rem;"><i class="fas fa-file-contract"></i> تم إنشاء عقد تلقائياً</div>`:''}
                </div>
            </div>
        </div>`;
    }).join('');
}

function validatePrice(){
    if(!currentBooking) return true;
    const input = document.getElementById('discount-price');
    const errEl = document.getElementById('price-error');
    const val = input.value.trim();

    if(!val){
        input.classList.remove('error');
        errEl.classList.remove('show');
        return true;
    }

    const price = Number(val);
    const minPrice = Math.ceil(currentBooking.price * 0.50);
    const maxPrice = currentBooking.price;

    if(isNaN(price) || price <= 0){
        input.classList.add('error');
        errEl.textContent = 'يرجى إدخال سعر صحيح';
        errEl.classList.add('show');
        return false;
    }

    if(price < minPrice){
        input.classList.add('error');
        errEl.textContent = `السعر المخفض لا يمكن أن يقل عن ${minPrice.toLocaleString('ar')} ₪ (50% من السعر الأصلي)`;
        errEl.classList.add('show');
        return false;
    }

    if(price > maxPrice){
        input.classList.add('error');
        errEl.textContent = `السعر المخفض لا يمكن أن يزيد عن ${maxPrice.toLocaleString('ar')} ₪ (السعر الأصلي)`;
        errEl.classList.add('show');
        return false;
    }

    input.classList.remove('error');
    errEl.classList.remove('show');
    return true;
}

function openAccept(id, price){
    actionId = id;
    currentBooking = { id, price };
    document.getElementById('discount-price').value = '';
    document.getElementById('discount-price').classList.remove('error');
    document.getElementById('price-error').classList.remove('show');
    const minPrice = Math.ceil(price * 0.50);
    document.getElementById('price-range-text').textContent =
        `النطاق المسموح: من ${minPrice.toLocaleString('ar')} ₪ إلى ${Number(price).toLocaleString('ar')} ₪`;
    document.getElementById('accept-modal').classList.add('show');
}

function openReject(id){
    actionId=id;
    document.getElementById('reject-reason').value='';
    document.getElementById('reject-modal').classList.add('show');
}

function closeModals(){
    actionId=null;
    currentBooking=null;
    document.getElementById('accept-modal').classList.remove('show');
    document.getElementById('reject-modal').classList.remove('show');
}

async function confirmAccept(){
    if(!validatePrice()) return;

    const disc = document.getElementById('discount-price').value.trim();
    const body = {};
    if(disc) body.discounted_price = Number(disc);

    const r = await fetch(`${BASE_URL}/host/bookings/${actionId}/accept`,{
        method:'PATCH', headers:authHeaders(), body:JSON.stringify(body)
    });

    if(r.ok){
        closeModals();
        allBookings = allBookings.map(b=>b.id===actionId?{...b,status:'accepted'}:b);
        filterTab(currentTab, document.querySelector('.tab.active'));
        showToast('✅ تم قبول الحجز وإنشاء العقد تلقائياً');
    } else {
        const data = await r.json().catch(()=>({}));
        if(r.status === 422 && data.errors?.discounted_price){
            const input = document.getElementById('discount-price');
            const errEl = document.getElementById('price-error');
            input.classList.add('error');
            errEl.textContent = data.errors.discounted_price[0];
            errEl.classList.add('show');
        } else {
            showToast(data.message || 'حدث خطأ، يرجى المحاولة مجدداً', true);
        }
    }
}

async function confirmReject(){
    const r = await fetch(`${BASE_URL}/host/bookings/${actionId}/reject`,{method:'PATCH',headers:authHeaders()});
    closeModals();
    if(r.ok){
        allBookings=allBookings.map(b=>b.id===actionId?{...b,status:'rejected'}:b);
        filterTab(currentTab,document.querySelector('.tab.active'));
        showToast('تم رفض الحجز');
    }
}

function showToast(msg, isError=false){
    const t=document.getElementById('toast');
    document.getElementById('toast-msg').textContent=msg;
    t.classList.toggle('error', isError);
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
}

init();
</script>
</body>
</html>
