<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css?v=20260628-live-fixes">
<title>Login</title>
</head>
<body>
<div class="center-page">
    <div class="card">
        <div class="logo">حمى</div>
        <h2>تسجيل الدخول</h2>

        <div id="msg"></div>

        <input id="email" placeholder="البريد الإلكتروني">
        <input id="password" type="password" placeholder="كلمة المرور">

        <button onclick="login()">تسجيل الدخول</button>

        <div class="center-text">
            <a href="forgot-password.html">
                نسيت كلمة المرور؟
            </a>
        </div>

        <div class="center-text">
            <a href="tenant-login.html">دخول المستأجر</a>
            <span style="color:#9CA3AF;margin:0 0.5rem;">|</span>
            <a href="host-login.html">دخول المضيف</a>
        </div>

        <div class="center-text">
            <a href="register.html">ليس لديك حساب؟ سجّل الآن</a>
        </div>
    </div>
</div>
<script src="js/api.js?v=20260628-absolute-nav"></script>

<script>
captureLoginRedirect();

async function login(){
    await loginWithRole();
} 
// تحقق من URL params بعد التفعيل
const urlParams = new URLSearchParams(window.location.search);
const verified  = urlParams.get('verified');
const error     = urlParams.get('error');

if (verified === 'success') {
    document.getElementById('msg').innerHTML =
        '<div class="success">✅ تم تفعيل حسابك! يمكنك الآن تسجيل الدخول</div>';
}
if (verified === 'already') {
    document.getElementById('msg').innerHTML =
        '<div class="success">حسابك مفعّل مسبقاً</div>';
}
if (error === 'invalid_link') {
    document.getElementById('msg').innerHTML =
        '<div class="error">رابط التفعيل غير صالح أو منتهي الصلاحية</div>';
}
</script>

</body>
</html>
